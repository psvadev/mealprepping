// ── localStorage helpers ───────────────────────────────────────────────────
const PFX = 'mp_';
function lsGet(key, fallback) {
  try { const v = localStorage.getItem(PFX + key); return v !== null ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function lsSet(key, value) {
  try { localStorage.setItem(PFX + key, JSON.stringify(value)); } catch {}
}

// ── Utilities ──────────────────────────────────────────────────────────────
function parseMeals(text) {
  try {
    const clean = text.replace(/```json[\s]*/gi,"").replace(/```[\s]*/g,"").trim();
    return JSON.parse(clean);
  } catch {
    try { const m = text.match(/\{[\s\S]*\}/); if (m) return JSON.parse(m[0]); } catch {}
    return null;
  }
}

function downloadFile(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ── Google Drive helpers ───────────────────────────────────────────────────
async function generatePKCE() {
  const arr = crypto.getRandomValues(new Uint8Array(48));
  const verifier = btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  const challenge = btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  return { verifier, challenge };
}
async function getValidAccessToken(clientId, clientSecret) {
  const t = lsGet('driveToken', null);
  if (!t) return null;
  if (Date.now() < t.expires_at - 60000) return t.access_token;
  if (!t.refresh_token || !clientId) return null;
  try {
    const res = await fetch('https://oauth2.googleapis.com/token', {
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({ grant_type:'refresh_token', refresh_token:t.refresh_token, client_id:clientId, client_secret:clientSecret||'' })
    });
    const d = await res.json();
    if (d.access_token) {
      const updated = { ...t, access_token:d.access_token, expires_at: Date.now()+(d.expires_in||3600)*1000 };
      lsSet('driveToken', updated);
      return d.access_token;
    }
    if (d.error === 'invalid_grant') {
      lsSet('driveToken', null);
      return 'TOKEN_EXPIRED';
    }
  } catch {}
  lsSet('driveToken', null);
  return null;
}

// ── Main App ───────────────────────────────────────────────────────────────
function App() {
  // API keys

  const [kassalKey,    setKassalKey]    = useState(() => lsGet('kassalKey',''));

  // Planning state

  const [favourites,  setFavourites]  = useState(() => lsGet('favourites', []));

  const [suggestionCount, setSuggestionCount] = useState(() => lsGet('suggestionCount', 15));
  const [units,           setUnits]           = useState(() => lsGet('units', 'metric'));

  // UI state
  const [view,          setView]          = useState('plan');
  const [loading,       setLoading]       = useState(false);
  const [shoppingLists, setShoppingLists] = useState(() => lsGet('shoppingLists', {}));
  const [shoppingWeek,  setShoppingWeek]  = useState(0);
  const [shoppingLoading,setShoppingLoading] = useState(false);
  const [error,         setError]         = useState(null);
  const [retryFn,       setRetryFn]       = useState(null);
  const [activeCell,    setActiveCell]    = useState(null);
  const [dragMeal,      setDragMeal]      = useState(null);
  const [dragSource,    setDragSource]    = useState(null);
  const [suggestionModal, setSuggestionModal] = useState(null);
  const [planModal,     setPlanModal]     = useState(null);
  const [recipeCache,   setRecipeCache]   = useState(() => lsGet('recipeCache', {}));
  const [recipeLoading, setRecipeLoading] = useState(null);
  const [filterProtein,   setFilterProtein]   = useState(null);
  const [filterCategory,  setFilterCategory]  = useState(null);
  const [showProtein,   setShowProtein]   = useState(false);
  const [showCuisine,   setShowCuisine]   = useState(false);
  const [showFavourites,setShowFavourites]= useState(false);
  const [confirmClear,  setConfirmClear]  = useState(false);
  const [confirmClearCache, setConfirmClearCache] = useState(false);
  const [lastShoppingKeys,setLastShoppingKeys]=useState(() => lsGet('lastShoppingKeys',{}));
  const [checkedItems,  setCheckedItems]  = useState(() => lsGet('checkedItems', {}));
  const [notesDraft,    setNotesDraft]    = useState('');

  const [isMobile, setIsMobile] = useState(() => Math.min(window.innerWidth, window.innerHeight) < 640);
  const [mobileWeek, setMobileWeek] = useState(0);

  // Google Drive sync state
  const [googleClientId,     setGoogleClientId]     = useState(() => lsGet('googleClientId', ''));
  const [googleClientSecret, setGoogleClientSecret] = useState(() => lsGet('googleClientSecret', ''));
  const [driveStatus,        setDriveStatus]        = useState('idle');

  useEffect(() => {
    const handler = () => setIsMobile(Math.min(window.innerWidth, window.innerHeight) < 640);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);

  const importRef = useRef(null);
  const driveSyncTimer = useRef(null);

  // ── Browser back-button support ───────────────────────────────────────────
  useEffect(() => {
    history.replaceState({ view:'plan' }, '');
  }, []);
  useEffect(() => {
    if (view !== 'plan') history.pushState({ view }, '');
    else history.replaceState({ view:'plan' }, '');
  }, [view]);
  useEffect(() => {
    const onPop = (e) => { setView(e.state?.view || 'plan'); };
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  // ── OAuth callback — exchanges ?code= for Drive tokens on redirect back ──
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (!code) return;
    const verifier = localStorage.getItem('drive_pkce_verifier');
    if (!verifier) return;
    localStorage.removeItem('drive_pkce_verifier');
    window.history.replaceState({}, '', window.location.pathname);
    const clientId     = lsGet('googleClientId', '');
    const clientSecret = lsGet('googleClientSecret', '');
    if (!clientId) return;
    fetch('https://oauth2.googleapis.com/token', {
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({
        code, client_id: clientId, client_secret: clientSecret,
        redirect_uri: window.location.origin + window.location.pathname,
        grant_type: 'authorization_code', code_verifier: verifier
      })
    }).then(r => r.json()).then(data => {
      if (data.access_token) {
        lsSet('driveToken', { access_token: data.access_token, refresh_token: data.refresh_token,
          expires_at: Date.now() + (data.expires_in || 3600) * 1000 });
        setDriveConnected(true);
        lsSet('pendingDriveLoad', true);
      } else {
        console.error('Drive token exchange failed:', data);
        setError(`Google Drive-feil: ${data.error} — ${data.error_description || ''}`);
        setDriveStatus('error');
      }
    }).catch(e => { console.error('Drive token exchange error:', e); setError(`Google Drive-nettverksfeil: ${e.message}`); setDriveStatus('error'); });
  }, []);

  // ── Persistence ──────────────────────────────────────────────────────────
  useEffect(() => lsSet('anthropicKey',    anthropicKey),    [anthropicKey]);

  useEffect(() => lsSet('plan',            plan),            [plan]);
  useEffect(() => lsSet('suggestions',     suggestions),     [suggestions]);
  useEffect(() => lsSet('favourites',      favourites),      [favourites]);
  useEffect(() => lsSet('freezerItems',   freezerItems),    [freezerItems]);
  useEffect(() => lsSet('dislikedMeals',  dislikedMeals),   [dislikedMeals]);
  useEffect(() => lsSet('mealHistory',     mealHistory),     [mealHistory]);
  useEffect(() => lsSet('mealNotes',       mealNotes),       [mealNotes]);
  useEffect(() => lsSet('proteinTargets',  proteinTargets),  [proteinTargets]);
  useEffect(() => lsSet('cuisineTargets',  cuisineTargets),  [cuisineTargets]);
  useEffect(() => lsSet('enabledCuisines', enabledCuisines), [enabledCuisines]);
  useEffect(() => lsSet('maxTime',         maxTime),         [maxTime]);
  useEffect(() => lsSet('exclusions',      exclusions),      [exclusions]);
  useEffect(() => lsSet('suggestionCount', suggestionCount), [suggestionCount]);
  useEffect(() => lsSet('units',           units),           [units]);
  useEffect(() => lsSet('recipeCache',     recipeCache),     [recipeCache]);
  useEffect(() => lsSet('shoppingLists',    shoppingLists),    [shoppingLists]);
  useEffect(() => lsSet('lastShoppingKeys', lastShoppingKeys), [lastShoppingKeys]);
  useEffect(() => lsSet('checkedItems',     checkedItems),     [checkedItems]);
  useEffect(() => lsSet('googleClientId',     googleClientId),     [googleClientId]);
  useEffect(() => lsSet('googleClientSecret', googleClientSecret), [googleClientSecret]);
  useEffect(() => lsSet('driveSyncedAt',    driveSyncedAt),    [driveSyncedAt]);

  // Sync note draft when modal opens
  useEffect(() => {
    if (planModal) setNotesDraft(mealNotes[planModal.meal.name] || '');
  }, [planModal?.meal?.name]);

  // Close modal on Escape
  useEffect(() => {
    const onKey = (e) => {
      if (e.key !== 'Escape') return;
      if (suggestionModal) { setSuggestionModal(null); return; }
      if (confirmClear) { setConfirmClear(false); return; }
      if (confirmClearCache) { setConfirmClearCache(false); return; }
      if (planModal) {
        setMealNotes(prev => ({...prev, [planModal.meal.name]: notesDraft}));
        setPlanModal(null);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [planModal, suggestionModal, confirmClear, confirmClearCache, notesDraft]);

  // ── Computed ─────────────────────────────────────────────────────────────
  const allCuisines = useMemo(() => CUISINE_LIBRARY.filter(c => enabledCuisines.includes(c.key)), [enabledCuisines]);
  const totalTargeted = Object.values(proteinTargets).reduce((a,b)=>a+b, 0);
  const weekPlanKey = (w) => plan[w].map(m=>m?.name||'').join('|')+'|'+portions;
  const filledCount = plan.slice(0,weeks).flat().filter(Boolean).length;
  const totalSlots = weeks * 7;

  const activeFreezerItems = useMemo(() => freezerItems.filter(i => i.remaining > 0), [freezerItems]);
  const freezerRemainingTotal = useMemo(() => activeFreezerItems.reduce((s, i) => s + i.remaining, 0), [activeFreezerItems]);
  const hasDepleted = useMemo(() => freezerItems.some(i => i.remaining === 0), [freezerItems]);

  const proteinStats = useMemo(() => Array.from({length:weeks},(_,w)=>{
    const c = {fisk:0,kylling:0,kjott:0,vegeta:0};
    for (let d=0;d<7;d++) { const m=plan[w][d]; if (m?.protein && c[m.protein]!==undefined) c[m.protein]++; }
    return c;
  }), [plan, weeks]);

  const nutritionSummary = useMemo(() => Array.from({length:weeks},(_,w)=>{
    const t = {calories:0,protein:0,fat:0,carbs:0,fiber:0};
    let count = 0;
    for (let d=0;d<7;d++) {
      const m = plan[w][d]; if (!m) continue;
      const r = recipeCache[m.name]; if (!r?.nutrition) continue;
      t.calories += r.nutrition.calories||0; t.protein += r.nutrition.protein||0;
      t.fat += r.nutrition.fat||0; t.carbs += r.nutrition.carbs||0; t.fiber += r.nutrition.fiber||0;
      count++;
    }
    return { ...t, count };
  }), [plan, weeks, recipeCache]);

  const batchTimeSummary = useMemo(() =>
    Array.from({length: weeks}, (_, w) => {
      let sumActive = 0, count = 0;
      const passiveTimes = [];
      for (let d = 0; d < 7; d++) {
        const m = plan[w][d];
        if (!m || m.leftover) continue;
        const r = recipeCache[m.name];
        const active = r?.activeMins ?? parseInt(m.prepTime) ?? 0;
        const passive = r?.passiveMins ?? 0;
        if (!isNaN(active)) { sumActive += active; count++; }
        if (!isNaN(passive) && passive > 0) passiveTimes.push(passive);
      }
      passiveTimes.sort((a, b) => b - a);
      let passiveEst = 0;
      for (let i = 0; i < passiveTimes.length; i += 4) passiveEst += passiveTimes[i];
      return { estimated: sumActive + passiveEst, count };
    }),
  [plan, weeks, recipeCache]);

  const fmtBatchTime = mins => {
    const h = Math.floor(mins / 60), m = mins % 60;
    if (h === 0) return `${m} min`;
    if (m === 0) return `${h}t`;
    return `${h}t ${m}min`;
  };

  const filteredSuggestions = useMemo(() => suggestions.filter(m => {
    if (filterProtein && m.protein !== filterProtein) return false;
    if (filterCategory && m.category !== filterCategory) return false;
    if (m.prepTime) { const mins=parseInt(m.prepTime); if (!isNaN(mins) && mins>maxTime) return false; }

  const fetchKassalPrice = useCallback(async (ingredients) => {
    if (!kassalKey) return null;
    const skip = ["salt","vann","pepper","krydder","olje","smør","hvitløk","sukker","mel","saus","kraft"];
    const adjectives = ["tørket","hermetiske","hermetisk","fersk","ferskpresset","hakket","malt","revet","skivet","kokt","rå","frossen","frosne"];
    const targets = ingredients.filter(i=>!skip.some(s=>i.toLowerCase().includes(s))).slice(0,4);
    let total=0, found=0;
    for (const ing of targets) {
      const stripped = ing.replace(/^[\d.,\s]+(g|kg|dl|l|stk|ss|ts|pk|boks|bokser|pose|skive|skiver|fedd|cm)?\s*/i,"").trim();
      if (!stripped || stripped.length<3) continue;
      // Take the first non-adjective word, strip any special characters
      const words = stripped.split(/\s+/).map(w => w.replace(/[^a-zA-Z0-9æøåÆØÅ]/g,""));
      const mainWord = words.find(w => w.length>=3 && !adjectives.includes(w.toLowerCase())) || words.find(w=>w.length>=3);
      if (!mainWord) continue;
      try {
        const r = await fetch(`https://kassal.app/api/v1/products?search=${encodeURIComponent(mainWord)}&size=5`,
          { headers:{ Authorization:`Bearer ${kassalKey}` } });
        const d = await r.json();
        const prices = (d?.data||[]).map(p=>p.current_price).filter(Boolean);
        if (prices.length) { total+=Math.min(...prices); found++; }
      } catch {}
    }
    if (found<1) return null;
    const base = total/portions;
    return { low:Math.round(base*0.85), high:Math.round(base*1.2), source:"kassal" };
  }, [kassalKey, portions]);

          messages:[{
            role:"user",
            content:`Svar alltid på norsk bokmål — aldri nynorsk, dialektformer eller engelske lånord i ingrediensnavn (f.eks. "kokosmelk" ikke "kokosmjølk" eller "kokosmilk", "melk" ikke "mjølk", "kjøttdeig" ikke "kjøttfars"). Bruk alltid samme stavemåte for samme ingrediens gjennom hele listen.\n\nLag en handleliste for uke ${week+1}. Bruk ingredienslistene der de finnes (allerede skalert). For retter uten ingrediensliste, skaler til ${portions} porsjoner:\n\n${mealLines}\n\nGrupper ingrediensene i disse faste kategoriene (bruk kun disse, velg de som er relevante):\n🥩 Kjøtt og fisk\n🥦 Frukt og grønt\n🧀 Meieri og egg\n🥫 Hermetikk og boksvarer\n🌾 Tørrvarer\n🍞 Brød og bakevarer\n❄️ Fryst\n🫙 Sauser og krydder\n🧂 Har du dette hjemme? For retter uten ingrediensliste: skaler mengder til ${portions} porsjoner. Ingrediensnavn skal være korte og enkle — bare produktnavnet og evt. relevant produktspesifikasjon som fettinnhold (f.eks. "Matfløte 35%", "Lettrømme") eller form (f.eks. "fersk", "frossen", "på boks"). Ikke ta med markedsføringsspråk som "økologisk", "uten konserveringsmidler", "naturlig" eller alternative varianter i parentes. Eksempel: "Grønn pesto" ikke "Grønn pesto (fersk eller på glass, uten konserveringsmidler)". For hver ingrediens: bruk en totalrad med ingrediensnavn og samlet mengde. Du MÅ alltid legge til en "items"-liste for alle spesifikke ingredienser — uansett om de brukes i én eller flere retter — ingen unntak. Hvert element i "items" viser rettens navn og mengden til den retten. Generiske basisingredienser som løk, hvitløk, ingefær, chili, gulrot, selleri, lime, sitron og ferske urter trenger ikke underrader — bare totalrad. Eksempel på struktur:\n[{ "name": "Kyllingfileter", "amount": "2.4 kg", "items": [{ "name": "Thai gryte", "amount": "1.3 kg" }, { "name": "Chicken adobo", "amount": "1.1 kg" }] }, { "name": "Løk", "amount": "9 stk" }] ${units === 'imperial'
              ? "Bruk imperiale mål (oz, lbs, cups, fl oz, tbsp, tsp)."
              : "Bruk norske måleenheter og forkortelser: g, kg, dl, ml, l, ss (spiseskje), ts (teskje), stk, fedd, klype, neve."
            } Bruk alltid punktum som desimalskilletegn i tall (f.eks. 1.2 kg, ikke 1,2 kg). For produkter som selges i faste pakningsstørrelser (hermetikk, bokser, kartong): ingrediensnavnet skal kun være produktnavnet uten emballasjetype eller størrelse (f.eks. "Kokosmelk" ikke "Kokosmelk, boks"), og mengden skal oppgi antall pakker med størrelse i parentes (f.eks. "4 bokser (400 ml)" ikke "1.6 l"). For hvitløk: summer alle fedd på tvers av retter. Hvis totalen overstiger 12 fedd, oppgi i hele hoder (rund opp, regn 12 fedd per hode), f.eks. "3 hoder hvitløk". Under 12 fedd: bare antall fedd, f.eks. "4 fedd hvitløk". Inkluder prisestimat per kategori og totalt, basert på norske butikkpriser.\n\nNår en rett inneholder komponenter som vanligvis kjøpes ferdig (f.eks. pizzabunn, tortillas, butterdeig, pitabrød), skal den ferdige komponenten listes som én ingrediens (f.eks. "Ferdig pizzabunn") – ikke enkeltingrediensene til deigen.\n\nLangtidsholdbare basisvarer som sjelden må kjøpes (salt, pepper, krydder, olje, eddik, soyasaus, mel, sukker, tørket pasta, ris, hermetikk, buljong, tomatpuré, honning, sennep o.l.) skal samles i én egen kategori kalt "Har du dette hjemme?" med emoji 🧂. Ikke ta med pris for denne kategorien. Alle andre ingredienser som bør kjøpes fersk denne uken legges i vanlige kategorier.\n\nSvar med dette JSON-formatet:\n{\n  "categories": [\n    {\n      "name": "Kjøtt og fisk",\n      "emoji": "🥩",\n      "price": { "low": 120, "high": 160 },\n      "items": [{ "name": "Kyllingfileter", "amount": "1.2 kg" }]\n    },\n    {\n      "name": "Har du dette hjemme?",\n      "emoji": "🧂",\n      "items": [{ "name": "Salt", "amount": "" }, { "name": "Olivenolje", "amount": "litt" }]\n    }\n  ],\n  "totalPrice": { "low": 450, "high": 620 }\n}${freezerNote}`
          }]
        })
      });
      const data = await res.json();
      if (!res.ok) { setError(`API-feil ${res.status}: ${data?.error?.message||JSON.stringify(data)}`); setRetryFn(() => () => generateShoppingList(week, true)); setShoppingLoading(false); return; }
      const text = data.content?.find(b=>b.type==="text")?.text||"";
      const parsed = parseMeals(text);
      if (parsed?.categories) {
        setShoppingLists(prev=>({...prev,[week]:parsed}));
        setLastShoppingKeys(prev=>({...prev,[week]:wKey}));
        setCheckedItems(prev=>{ const n={...prev}; delete n[week]; return n; });
      } else { setError(`Kunne ikke tolke handleliste. Rå respons: ${text.slice(0,300)}`); setRetryFn(() => () => generateShoppingList(week, true)); }
    } catch (err) { setError(`Nettverksfeil: ${err.message}`); setRetryFn(() => () => generateShoppingList(week, true)); }
    setShoppingLoading(false);
  };

  function toggleCheckedItem(week, catName, itemName) {
    const key = `${catName}|${itemName}`;
    setCheckedItems(prev => {
      const weekMap = { ...(prev[week] || {}) };
      if (weekMap[key]) delete weekMap[key];
      else weekMap[key] = true;
      return { ...prev, [week]: weekMap };
    });
  }

  // ── Export / import ───────────────────────────────────────────────────────
  const exportPlan = () => {
    const data = { weeks, portions, plan, suggestions, proteinTargets, maxTime, exclusions,
      cuisineTargets, enabledCuisines, suggestionCount, units, shoppingLists, lastShoppingKeys,
      favourites, mealNotes, mealHistory, freezerItems, dislikedMeals, exportedAt: new Date().toISOString() };
    const date = new Date().toISOString().split('T')[0];
    downloadFile(JSON.stringify(data, null, 2), `middagsplan-${date}.json`, 'application/json');
  };

  const importPlan = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.plan) setPlan(d.plan);
        if (d.weeks) setWeeks(d.weeks);
        if (d.portions) setPortions(d.portions);
        if (d.suggestions) setSuggestions(d.suggestions);
        if (d.proteinTargets) setProteinTargets(d.proteinTargets);
        if (d.maxTime) setMaxTime(d.maxTime);
        if (d.exclusions!==undefined) setExclusions(d.exclusions);
        if (d.cuisineTargets) setCuisineTargets(d.cuisineTargets);
        if (d.enabledCuisines) setEnabledCuisines(d.enabledCuisines);
        if (d.units) setUnits(d.units);
        if (d.shoppingLists) setShoppingLists(d.shoppingLists);
        if (d.lastShoppingKeys) setLastShoppingKeys(d.lastShoppingKeys);
        if (d.suggestionCount) setSuggestionCount(d.suggestionCount);
        if (d.favourites) setFavourites(d.favourites);
        if (d.mealNotes) setMealNotes(d.mealNotes);
        if (d.mealHistory) setMealHistory(d.mealHistory);
        if (d.freezerItems) setFreezerItems(d.freezerItems);
        if (d.dislikedMeals) setDislikedMeals(d.dislikedMeals);
        setError(null);
      } catch { setError("Kunne ikke lese filen. Sjekk at det er en gyldig middagsplan-fil."); }
    };
    reader.readAsText(file);
    e.target.value="";
  };

  const exportShoppingList = () => {
    const sl = shoppingLists[shoppingWeek];
    if (!sl) return;
    const date = new Date().toLocaleDateString("nb-NO");
    const header = `Handleliste uke ${shoppingWeek+1} — ${portions} porsjoner per rett\nGenerert ${date}\n\n`;
    const lines = sl.categories.map(cat =>
      `${cat.emoji} ${cat.name}${cat.price ? ` (ca. ${cat.price.low}–${cat.price.high} kr)` : ""}\n${cat.items.map(i=>`  - ${i.name}${i.amount ? `: ${i.amount}` : ""}${i.items?.length ? "\n"+i.items.map(s=>`      • ${s.name}${s.amount ? `: ${s.amount}` : ""}`).join("\n") : ""}`).join("\n")}`
    ).join("\n\n");
    const price = sl.totalPrice
      ? `\n\nEstimert totalpris: ca. ${sl.totalPrice.low}–${sl.totalPrice.high} kr`
      : "";
    downloadFile(header+lines+price, `handleliste-uke${shoppingWeek+1}.txt`, 'text/plain;charset=utf-8');
  };

  // ── Google Drive sync ────────────────────────────────────────────────────
  const saveToDrive = useCallback(async (data) => {
    const token = await getValidAccessToken(googleClientId, googleClientSecret);
    if (token === 'TOKEN_EXPIRED') { setDriveConnected(false); setDriveStatus('expired'); return; }
    if (!token) return;
    setDriveStatus('syncing');
    const blob = new Blob([JSON.stringify(data)], { type:'application/json' });
    const fileId = lsGet('driveFileId', '');
    try {
      let res;
      if (fileId) {
        res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
          method:'PATCH', headers:{ Authorization:`Bearer ${token}`, 'Content-Type':'application/json' }, body:blob
        });
        if (res.status === 404) { lsSet('driveFileId', ''); setDriveStatus('error'); return; }
      } else {
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify({ name:'reheat-and-eat-backup.json', mimeType:'application/json' })], { type:'application/json' }));
        form.append('file', blob);
        res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
          method:'POST', headers:{ Authorization:`Bearer ${token}` }, body:form
        });
        const d = await res.json();
        if (d.id) lsSet('driveFileId', d.id);
      }
      if (res.ok) {
        setDriveSyncedAt(new Date().toISOString());
        setDriveStatus('synced');
      } else { setDriveStatus('error'); }
    } catch { setDriveStatus('error'); }
  }, [googleClientId, googleClientSecret]);

  const loadFromDrive = useCallback(async () => {
    const token = await getValidAccessToken(googleClientId, googleClientSecret);
    if (token === 'TOKEN_EXPIRED') { setDriveConnected(false); setDriveStatus('expired'); return; }
    if (!token) return;
    setDriveStatus('syncing');
    try {
      let fileId = lsGet('driveFileId', '');
      if (!fileId) {
        const s = await fetch(`https://www.googleapis.com/drive/v3/files?q=name%3D'reheat-and-eat-backup.json'&spaces=drive&fields=files(id)`,
          { headers:{ Authorization:`Bearer ${token}` } });
        const sd = await s.json();
        fileId = sd.files?.[0]?.id || '';
        if (fileId) lsSet('driveFileId', fileId);
      }
      if (!fileId) { setDriveStatus('idle'); return; }
      const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
        { headers:{ Authorization:`Bearer ${token}` } });
      if (!res.ok) { setDriveStatus('error'); return; }
      const d = await res.json();
      if (d.plan) setPlan(d.plan);
      if (d.weeks) setWeeks(d.weeks);
      if (d.portions) setPortions(d.portions);
      if (d.suggestions) setSuggestions(d.suggestions);
      if (d.proteinTargets) setProteinTargets(d.proteinTargets);
      if (d.maxTime) setMaxTime(d.maxTime);
      if (d.exclusions !== undefined) setExclusions(d.exclusions);
      if (d.cuisineTargets) setCuisineTargets(d.cuisineTargets);
      if (d.enabledCuisines) setEnabledCuisines(d.enabledCuisines);
      if (d.units) setUnits(d.units);
      if (d.shoppingLists) setShoppingLists(d.shoppingLists);
      if (d.lastShoppingKeys) setLastShoppingKeys(d.lastShoppingKeys);
      if (d.recipeCache) setRecipeCache(d.recipeCache);
      if (d.suggestionCount) setSuggestionCount(d.suggestionCount);
      if (d.favourites) setFavourites(d.favourites);
      if (d.mealNotes) setMealNotes(d.mealNotes);
      if (d.mealHistory) setMealHistory(d.mealHistory);
      if (d.freezerItems) setFreezerItems(d.freezerItems);
      if (d.dislikedMeals) setDislikedMeals(d.dislikedMeals);
      setDriveSyncedAt(new Date().toISOString());
      setDriveStatus('synced');
    } catch { setDriveStatus('error'); }
  }, [googleClientId, googleClientSecret]);

  const connectGoogleDrive = useCallback(async () => {
    if (!googleClientId || !googleClientSecret) return;
    const { verifier, challenge } = await generatePKCE();
    localStorage.setItem('drive_pkce_verifier', verifier);
    const params = new URLSearchParams({
      client_id: googleClientId,
      redirect_uri: window.location.origin + window.location.pathname,
      response_type: 'code',
      scope: 'https://www.googleapis.com/auth/drive.file',
      code_challenge: challenge,
      code_challenge_method: 'S256',
      access_type: 'offline',
      prompt: 'consent'
    });
    window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?${params}`;
  }, [googleClientId, googleClientSecret]);

  const disconnectGoogleDrive = useCallback(async () => {
    const t = lsGet('driveToken', null);
    if (t) {
      const token = t.access_token || t.refresh_token;
      if (token) {
        try { await fetch(`https://oauth2.googleapis.com/revoke?token=${token}`, { method:'POST' }); } catch {}
      }
    }
    localStorage.removeItem('mp_driveToken');
    localStorage.removeItem('mp_driveFileId');
    setDriveConnected(false);
    setDriveStatus('idle');
    setDriveSyncedAt(null);
  }, []);

  // Load from Drive on startup if already connected
  useEffect(() => {
    if (driveConnected) loadFromDrive();
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  // Load after OAuth redirect (pendingDriveLoad flag avoids stale closure)
  useEffect(() => {
    if (driveConnected && lsGet('pendingDriveLoad', false)) {
      lsSet('pendingDriveLoad', false);
      loadFromDrive();
    }
  }, [driveConnected, loadFromDrive]);

  // Auto-save to Drive 2 s after any key state change
  useEffect(() => {
    if (!driveConnected) return;
    clearTimeout(driveSyncTimer.current);
    driveSyncTimer.current = setTimeout(() => {
      const hasMeals = plan.some(week => week.some(day => day !== null));
      if (!hasMeals) return;
      saveToDrive({ plan, weeks, portions, suggestions, proteinTargets, maxTime, exclusions,
        cuisineTargets, enabledCuisines, suggestionCount, units, shoppingLists, lastShoppingKeys,
        recipeCache, favourites, mealNotes, mealHistory, freezerItems, dislikedMeals });
    }, 2000);
    return () => clearTimeout(driveSyncTimer.current);
  }, [plan, freezerItems, favourites, mealHistory, dislikedMeals, mealNotes, shoppingLists, lastShoppingKeys, recipeCache, driveConnected]);

  const printPlan = () => {
    const rows = Array.from({length:weeks},(_,w) => {
      const cells = DAYS.map((d,di) => {
        const meal = plan[w][di];
        return `<td>${meal ? meal.emoji+" "+meal.name : "<span class='empty'>—</span>"}</td>`;
      }).join("");
      return `<tr><td>Uke ${w+1}</td>${cells}</tr>`;
    }).join("");

    const shoppingHtml = Array.from({length:weeks},(_,w) => {
      const sl = shoppingLists[w];
      if (!sl) return "";
      return `
        <h2 style="margin:32px 0 12px;font-size:16px">🛒 Handleliste uke ${w+1} — ${portions} porsjoner per rett</h2>
        ${sl.totalPrice ? `<p class="price">Estimert totalpris: ca. ${sl.totalPrice.low}–${sl.totalPrice.high} kr</p>` : ""}
        <div style="column-count:3;column-gap:24px">
          ${sl.categories.map(cat=>`<div class="cat-box" style="break-inside:avoid;margin-bottom:20px">
            <div class="cat-title">${cat.emoji} ${cat.name}</div>
            <ul>${cat.items.map(i=>`<li>${i.name}${i.amount ? ` — ${i.amount}` : ""}${i.items?.length ? `<ul style="margin:2px 0 4px;padding-left:14px">${i.items.map(s=>`<li style="color:#999;font-size:11px">${s.name}${s.amount ? ` — ${s.amount}` : ""}</li>`).join("")}</ul>` : ""}</li>`).join("")}</ul>
          </div>`).join("")}
        </div>`;
    }).join("");

    const html = `<!DOCTYPE html><html lang="nb"><head><meta charset="utf-8"><title>Middagsplan</title>
      <style>
        body{font-family:sans-serif;padding:24px;max-width:1000px;margin:0 auto;background:#0e0f11;color:#e4ddd0}
        h1,h2{color:#e4ddd0}
        table{border-collapse:collapse;width:100%;table-layout:fixed}
        th,td{border:1px solid #2a2b30;padding:6px 8px;font-size:11px;word-wrap:break-word;overflow-wrap:break-word}
        thead th{background:#18191c;color:#b4b2c2;font-size:10px}
        tbody td{background:#141517;vertical-align:top}
        td:first-child{background:#18191c;color:#747280;font-size:10px;font-weight:600;white-space:nowrap;width:48px}
        .empty{color:#3a3b40}
        .cat-title{font-weight:700;font-size:13px;margin-bottom:6px;color:#e8a838}
        .cat-box{min-width:180px}
        ul{margin:0;padding-left:16px;font-size:12px;color:#b4b2c2}
        .meta{color:#747280;font-size:12px;margin-bottom:20px}
        .price{font-size:12px;color:#747280;margin-bottom:12px}
        .print-btn{padding:8px 20px;cursor:pointer;background:#22232a;border:1px solid #2a2b30;color:#e8a838;border-radius:6px;font-size:13px}
        @media print{body{background:#fff;color:#111}th,td{border-color:#ccc}thead th{background:#f0f0f0;color:#333}tbody td{background:#fff}td:first-child{background:#f8f8f8;color:#555}.print-btn{display:none}}
      </style>
      </head><body>
      <h1 style="font-size:20px;margin-bottom:4px">🧊 Reheat &amp; Eat</h1>
      <p class="meta">Generert ${new Date().toLocaleDateString("nb-NO")} · ${portions} porsjoner per rett</p>
      <table>
        <thead><tr><th style="text-align:left"></th>
          ${DAYS.map(d=>`<th>${d}</th>`).join("")}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${shoppingHtml}
      <p style="margin-top:32px;display:flex;gap:10px"><button onclick="window.print()" class="print-btn">Skriv ut</button><button onclick="window.close()" class="print-btn" style="background:#3a1a1a;color:#e87060;border-color:#e87060">✕ Lukk</button></p>
      <script>document.addEventListener('keydown',e=>{if(e.key==='Escape')window.close();});<\/script>
      </body></html>`;

    const win = window.open('','_blank');
    if (!win) { setError("Popup-blokkering er aktiv. Tillat popup-vinduer for denne siden og prøv igjen."); return; }
    win.document.write(html); win.document.close(); win.focus();
  };

  // ── Notes ─────────────────────────────────────────────────────────────────
  const saveNote = () => {
    if (!planModal) return;
    setMealNotes(prev => ({...prev, [planModal.meal.name]: notesDraft}));
  };

  // ── Shared button styles ──────────────────────────────────────────────────
  const btnTab = (active) => ({
    padding:"6px 14px", borderRadius:6,
    border: active ? "2px solid #e8a838" : "1px solid #2a2b30",
    background: active ? "#22232a" : "transparent",
    color: active ? "#e8e0d0" : "#b4b2c2",
    cursor:"pointer", fontSize:12, fontFamily:"sans-serif"
  });

  const btnIcon = () => ({
    padding:"6px 12px", borderRadius:6, border:"1px solid #2a2b30",
    background:"transparent", color:"#b4b2c2", cursor:"pointer", fontSize:12, fontFamily:"sans-serif"
  });

  // ──────────────────────────────────────────────────────────────────────────
  // RENDER
  // ──────────────────────────────────────────────────────────────────────────
  return (
    <div style={ isMobile
      ? { position:"fixed", inset:0, display:"flex", flexDirection:"column", background:"#0e0f11" }
      : { minHeight:"100vh", background:"#0e0f11", paddingBottom:60 }
    }>
      <div style={isMobile ? { flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch" } : {}}>

      {/* ── Header ── */}
      <div style={{ background:"linear-gradient(180deg,#1a1b1e 0%,#0e0f11 100%)",
        borderBottom:"1px solid #2a2b30", padding: isMobile ? "12px 16px 10px" : "20px 20px 14px", position:"sticky", top:0, zIndex:100 }}>
        <div className="grid-container" style={{ maxWidth:1400, margin:"0 auto" }}>

          {/* Title row */}
          <div style={{ display:"flex", alignItems:"baseline", gap:10, marginBottom:2 }}>
            <span style={{ fontSize:22 }}>🧊</span>
            <h1 style={{ fontSize:19, fontWeight:700, letterSpacing:"2px", margin:0, color:"#e8e0d0", textTransform:"uppercase" }}>
              REHEAT <span style={{ color:"#e8a838" }}>&amp;</span> EAT
            </h1>
          </div>
          <p style={{ margin:0, fontSize:11, color:"#a8a6b6", fontFamily:"sans-serif" }}>
            Lag én gang. Spis hele uken.
          </p>

          {/* Week selector — mobile only */}
          {isMobile && weeks > 1 && (
            <div style={{ display:"flex", alignItems:"center", gap:5, marginTop:10 }}>
              <span style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif", letterSpacing:"0.5px" }}>UKE</span>
              {Array.from({length:weeks},(_,i)=>i).map(w => (
                <button key={w} onClick={()=>{ setMobileWeek(w); setShoppingWeek(w); }} style={{
                  width:30, height:30, borderRadius:5,
                  border: mobileWeek===w ? "2px solid #e8a838" : "1px solid #2a2b30",
                  background: mobileWeek===w ? "#22232a" : "transparent",
                  color: mobileWeek===w ? "#e8e0d0" : "#b4b2c2",
                  cursor:"pointer", fontSize:13, fontFamily:"sans-serif", fontWeight: mobileWeek===w ? 700 : 400
                }}>{w+1}</button>
              ))}
            </div>
          )}

          {/* Controls row */}
          {!isMobile && <div style={{ display:"flex", gap:10, marginTop:12, flexWrap:"wrap", alignItems:"center" }}>

            {/* Uker */}
            <div style={{ display:"flex", alignItems:"center", gap:5 }}>
              <span style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif", letterSpacing:"0.5px" }}>UKE</span>
              {[1,2,3,4].map(w => (
                <button key={w} onClick={()=>{ setWeeks(w); if(view==="shopping") setShoppingWeek(w-1); }} style={{
                  width:28, height:28, borderRadius:5,
                  border: weeks===w ? "2px solid #e8a838" : "1px solid #2a2b30",
                  background: weeks===w ? "#22232a" : "transparent",
                  color: weeks===w ? "#e8e0d0" : "#b4b2c2",
                  cursor:"pointer", fontSize:13, fontFamily:"sans-serif", fontWeight: weeks===w ? 700 : 400
                }}>{w}</button>
              ))}
            </div>

            {/* Porsjoner */}
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <span style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif", letterSpacing:"0.5px" }}>PORSJONER</span>
              <Stepper value={portions} min={1} max={20} onChange={changePortions} />
              <span style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif" }}>per rett</span>
            </div>

            {/* Proteinmål */}
            <button onClick={()=>{setShowProtein(s=>!s);setShowCuisine(false);}} style={{
              display:"flex", alignItems:"center", gap:6, padding:"5px 12px", borderRadius:6,

                              onDrop={e=>{
                                e.preventDefault(); e.currentTarget.style.borderColor=""; e.currentTarget.style.background="";
                                if (!dragMeal) return;
                                const existing=plan[w][d];
                                if (dragSource) {
                                  if (dragSource.week===w && dragSource.day===d) { setDragMeal(null); setDragSource(null); return; }
                                  setPlan(prev=>{ const next=prev.map(r=>[...r]); next[w][d]=dragMeal; next[dragSource.week][dragSource.day]=existing??null; return next; });
                                } else {
                                  setPlan(prev=>{ const next=prev.map(r=>[...r]); next[w][d]=dragMeal; return next; });
                                  if (!dragMeal.leftover) setSuggestions(prev=>{ let next=prev.filter(m=>m.name!==dragMeal.name); if(existing&&!existing.leftover&&!next.find(m=>m.name===existing.name)) next=[...next,existing]; return next; });

                                }
                                setDragMeal(null); setDragSource(null); setActiveCell(null);

                                  </>

                                  <>
                                    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>

                            </div>
                          </td>
                        );
                      })}

                                </span>
                              </div>

                      </td>
                    </tr>

              </table>

                <button onClick={()=>setActiveCell(null)} style={{ marginLeft:12, background:"transparent",

                <div key={w} style={{ marginBottom:8, width:"fit-content", background:"#18191c",

                  <span style={{ color:"#b4b2c2" }}>{bt.count} retter</span>

                      <span style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif" }}>{n.label}</span>
                    </div>
                  ))}
                </div>
              );
            })}

            {/* Favourites panel */}
            {showFavourites && (
              <div style={{ background:"#18191c", border:"1px solid #2a2b30",

                        <span style={{ fontSize:16 }}>{meal.emoji}</span>

                        <button onClick={e=>{ e.stopPropagation(); setFavourites(prev=>prev.filter(m=>m.name!==meal.name)); }}

                            fontSize:12, padding:"0 0 0 2px", lineHeight:1 }}>✕</button>

                      color: !filterProtein && !filterCategory ? "#e8e0d0" : "#b4b2c2", cursor:"pointer", fontFamily:"sans-serif"
                    }}>Alle</button>
                    {PROTEINS.map(p => {
                      const count = suggestions.filter(s=>s.protein===p.key).length;

                      return (
                        <div key={p.key} style={{ display:"flex", alignItems:"center", gap:2 }}>
                          <button onClick={()=>{setFilterProtein(filterProtein===p.key?null:p.key);setFilterCategory(null);}} style={{
                            fontSize:10, padding:"3px 9px", borderRadius:10,
                            border: filterProtein===p.key ? `1px solid ${p.color}` : "1px solid #2a2b30",
                            background: filterProtein===p.key ? p.bg : "transparent",
                            color: filterProtein===p.key ? p.color : "#b4b2c2", cursor:"pointer", fontFamily:"sans-serif"
                          }}>{p.emoji} {p.label} ({count})</button>
                          {filterProtein===p.key && <button onClick={()=>rerollProtein(p.key)} disabled={!!rerollLoading} title={`Hent 5 nye ${p.label}-forslag`} style={{
                            fontSize:11, padding:"2px 6px", borderRadius:10, border:`1px solid #2a2b30`,
                            background:"transparent", color: rerollLoading===p.key ? p.color : "#747280",
                            cursor: rerollLoading ? "not-allowed" : "pointer", fontFamily:"sans-serif", lineHeight:1

                        </div>
                      );

                      const count = suggestions.filter(s=>s.category===cat.key).length;
                      if (!count) return null;
                      return (
                        <button key={cat.key} onClick={()=>{setFilterCategory(filterCategory===cat.key?null:cat.key);setFilterProtein(null);}} style={{

            <div style={{ background:"#18191c", border:"1px solid #22232a", borderRadius:10,

                    </div>
                  ))}
                </div>

                    cursor:"pointer", fontSize:12, fontFamily:"sans-serif" }}>⬇ Eksporter handleliste (.txt)</button>
                )}
              </div>

              <div style={{ display:"flex", flexDirection:"column", gap:16 }}>

                    return groups;

                ).sort(([a],[b]) => b.localeCompare(a)).map(([date, items]) => {
                    const ageDays  = Math.floor((Date.now() - new Date(date+'T12:00:00').getTime()) / 86400000);
                    const isOld    = ageDays >= 90;
                    const isAgeing = ageDays >= 60 && ageDays < 90;
                    return (
                  <div key={date}>
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <div style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif",
                          letterSpacing:"0.8px", fontWeight:600 }}>
                          LAGET {new Date(date+'T12:00:00').toLocaleDateString("nb-NO",{day:"numeric",month:"long",year:"numeric"}).toUpperCase()} · {items[0].portionCount ?? items[0].total} PORSJONER
                        </div>
                        {isOld    && <span style={{ fontSize:9, color:"#c8882a", background:"#2a1e0a",
                          border:"1px solid #4a3a1a", borderRadius:6, padding:"1px 6px",
                          fontFamily:"sans-serif", fontWeight:600 }}>⚠ {ageDays} {ageDays === 1 ? "dag" : "dager"} gammel</span>}

                          border:"1px solid #4a4420", borderRadius:6, padding:"1px 8px",
                          fontFamily:"sans-serif", fontWeight:600 }}>⏰ {ageDays} {ageDays === 1 ? "dag" : "dager"} · bruk snart</span>}
                      </div>
                      <button onClick={()=>setFreezerItems(prev=>prev.filter(i=>i.cookedAt!==date))}

                          fontSize:11, fontFamily:"sans-serif" }}>Fjern batch</button>
                    </div>
                    <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                      {items.map(item => {
                        return (
                        <div key={item.id} style={{ display:"flex", alignItems:"center", gap:10,
                          padding:"10px 14px", background:"#18191c", borderRadius:9,

                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ fontSize:13, color:"#e4ddd0", fontWeight:600,
                              overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.name}</div>
                            <div style={{ marginTop:3, display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                              <ProteinBadge protein={item.protein} />
                              {dislikedMeals.includes(item.name) && <span style={{ fontSize:9, color:"#d47070", background:"#2a1a1a",
                                border:"1px solid #3a2a2a", borderRadius:6, padding:"1px 6px",
                                fontFamily:"sans-serif", fontWeight:600 }}>👎 Likt ikke</span>}
                            </div>
                          </div>
                          {item.remaining < item.total && (
                            <div style={{ display:"flex", gap:4, flexShrink:0 }}>
                              <button
                                onClick={()=>{
                                  const meal = {name:item.name, emoji:item.emoji, protein:item.protein};
                                  if (!favourites.find(f=>f.name===meal.name)) setFavourites(prev=>[...prev, meal]);
                                  setDislikedMeals(prev=>prev.filter(n=>n!==item.name));
                                }}
                                title="Likte — legg til favoritter"
                                style={{ width:30, height:30, borderRadius:6, border:`1px solid ${favourites.find(f=>f.name===item.name)?"#4a7a4a":"#2a2b30"}`,
                                  background: favourites.find(f=>f.name===item.name) ? "#1a2a1a" : "transparent",
                                  cursor:"pointer", fontSize:15, lineHeight:1 }}>👍</button>
                              <button
                                onClick={()=>{
                                  setDislikedMeals(prev=>prev.includes(item.name)?prev:[...prev,item.name]);
                                  setFavourites(prev=>prev.filter(f=>f.name!==item.name));
                                }}
                                title="Likte ikke — utelat fra fremtidige forslag"
                                style={{ width:30, height:30, borderRadius:6, border:`1px solid ${dislikedMeals.includes(item.name)?"#7a2a2a":"#2a2b30"}`,
                                  background: dislikedMeals.includes(item.name) ? "#2a1a1a" : "transparent",
                                  cursor:"pointer", fontSize:15, lineHeight:1 }}>👎</button>
                            </div>
                          )}
                          {item.remaining === 0 ? (
                            <span style={{ fontSize:11, color:"#747280", fontFamily:"sans-serif",
                              padding:"3px 10px", background:"#141517", borderRadius:8 }}>Tomt</span>
                          ) : (
                            <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
                              <button onClick={()=>setFreezerItems(prev=>prev.map(i=>i.id===item.id?{...i,remaining:Math.max(0,i.remaining-1)}:i))}
                                style={{ width:28, height:28, borderRadius:6, border:"1px solid #2a2b30",
                                  background:"#141517", color:"#e4ddd0", cursor:"pointer",
                                  fontSize:16, fontFamily:"sans-serif", lineHeight:1 }}>−</button>
                              <span style={{ fontSize:12, fontFamily:"sans-serif", color:"#e4ddd0", minWidth:56, textAlign:"center" }}>{item.remaining} bokser</span>

                                disabled={item.remaining >= 40}
                                style={{ width:28, height:28, borderRadius:6, border:"1px solid #2a2b30",
                                  background:"#141517", color: item.remaining >= 40 ? "#3a3b40" : "#e4ddd0",
                                  cursor: item.remaining >= 40 ? "default" : "pointer",
                                  fontSize:16, fontFamily:"sans-serif", lineHeight:1 }}>+</button>
                            </div>
                          )}
                          <button onClick={()=>setFreezerItems(prev=>prev.filter(i=>i.id!==item.id))}
                            style={{ width:28, height:28, borderRadius:6, border:"1px solid #3a2a2a",
                              background:"transparent", color:"#d47070", cursor:"pointer",
                              fontSize:14, fontFamily:"sans-serif", flexShrink:0 }}>✕</button>
                        </div>
                      ); })}
                    </div>
                  </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>

        <div onClick={()=>setConfirmClear(false)} style={{ position:"fixed", inset:0,
          background:"rgba(0,0,0,0.75)", zIndex:300, display:"flex",
          alignItems:"center", justifyContent:"center", padding:16 }}>
          <div onClick={e=>e.stopPropagation()} style={{ background:"#18191c", border:"1px solid #3a2a2a",

            <p style={{ margin:"0 0 24px", fontSize:13, color:"#a8a6b6", fontFamily:"sans-serif", lineHeight:1.6 }}>
              Dette fjerner alle middager fra ukeplanen og handlelisten. Forslag og favoritter beholdes.
            </p>
            <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
              <button onClick={()=>setConfirmClear(false)} style={{ padding:"8px 20px", borderRadius:8,
                border:"1px solid #2a2b30", background:"transparent", color:"#b4b2c2",
                cursor:"pointer", fontSize:13, fontFamily:"sans-serif" }}>Avbryt</button>
              <button onClick={clearPlan} style={{ padding:"8px 20px", borderRadius:8, border:"none",
                background:"#5a2020", color:"#f0c0c0", cursor:"pointer", fontSize:13,
                fontFamily:"sans-serif", fontWeight:700 }}>Ja, tøm planen</button>
            </div>
          </div>
        </div>
      )}

      {/* ── CONFIRM CLEAR CACHE MODAL ── */}
      {confirmClearCache && (
        <div onClick={()=>setConfirmClearCache(false)} style={{ position:"fixed", inset:0,
          background:"rgba(0,0,0,0.75)", zIndex:300, display:"flex",
          alignItems:"center", justifyContent:"center", padding:16 }}>
          <div onClick={e=>e.stopPropagation()} style={{ background:"#18191c", border:"1px solid #3a2a2a",
            borderRadius:14, padding:28, maxWidth:380, width:"100%", textAlign:"center" }}>
            <div style={{ fontSize:28, marginBottom:12 }}>🗑</div>
            <h2 style={{ margin:"0 0 8px", fontSize:16, color:"#e4ddd0" }}>Tøm oppskriftsbufferet?</h2>
            <p style={{ margin:"0 0 24px", fontSize:13, color:"#a8a6b6", fontFamily:"sans-serif", lineHeight:1.6 }}>
              Oppskrifter lastes inn på nytt ved behov.
            </p>
            <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
              <button onClick={()=>setConfirmClearCache(false)} style={{ padding:"8px 20px", borderRadius:8,
                border:"1px solid #2a2b30", background:"transparent", color:"#b4b2c2",
                cursor:"pointer", fontSize:13, fontFamily:"sans-serif" }}>Avbryt</button>
              <button onClick={()=>{ setRecipeCache({}); setConfirmClearCache(false); }} style={{ padding:"8px 20px", borderRadius:8, border:"none",
                background:"#5a2020", color:"#f0c0c0", cursor:"pointer", fontSize:13,
                fontFamily:"sans-serif", fontWeight:700 }}>Ja, tøm bufferet</button>
            </div>
          </div>
        </div>
      )}

      {/* ── SUGGESTION PREVIEW MODAL ── */}
      {suggestionModal && (
        <div onClick={()=>setSuggestionModal(null)}
          style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.78)", zIndex:200,
            display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
          <div onClick={e=>e.stopPropagation()}
            style={{ background:"#18191c", borderRadius:14, padding:24, maxWidth:780, width:"100%",
              maxHeight:"85vh", overflowY:"auto", border:"1px solid #2a2b30", position:"relative" }}>
            <div style={{ display:"flex", alignItems:"flex-start", gap:12, marginBottom:14 }}>
              <span style={{ fontSize:32 }}>{suggestionModal.emoji}</span>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:16, fontWeight:700, color:"#e4ddd0", marginBottom:6 }}>{suggestionModal.name}</div>
                <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                  <span style={{ fontSize:11, padding:"2px 8px", background:"#141517",
                    borderRadius:10, color:"#aaa8b8", fontFamily:"sans-serif" }}>⏱ {suggestionModal.prepTime}</span>
                  <ProteinBadge protein={suggestionModal.protein} />
                  <CategoryBadge category={suggestionModal.category} />
                </div>
              </div>
              <div style={{ display:"flex", gap:8, flexShrink:0 }}>
                <button onClick={e=>{e.stopPropagation();toggleFavourite(suggestionModal);}} style={{
                  background:"transparent", border:"1px solid #2a2b30", borderRadius:7,
                  cursor:"pointer", fontSize:16, color:isFavourite(suggestionModal)?"#e8a838":"#44424e",
                  padding:"4px 10px"
                }} title={isFavourite(suggestionModal)?"Fjern fra favoritter":"Legg til favoritter"}>★</button>
                <button onClick={()=>setSuggestionModal(null)} style={{
                  background:"transparent", border:"1px solid #2a2b30", borderRadius:7,
                  cursor:"pointer", fontSize:14, color:"#747280", padding:"4px 10px", fontFamily:"sans-serif"
                }}>✕</button>
              </div>
            </div>
            <p style={{ margin:"0 0 16px", fontSize:12, color:"#b4b2c2", lineHeight:1.6, fontFamily:"sans-serif" }}>
              {suggestionModal.description}
            </p>
            {(() => {
              const recipe = recipeCache[suggestionModal.name];
              const isLoadingRecipe = recipeLoading===suggestionModal.name;
              if (isLoadingRecipe) return <div style={{ fontSize:12, color:"#a8a6b6", fontFamily:"sans-serif", padding:"20px 0", textAlign:"center" }}>Laster oppskrift...</div>;
              if (!recipe) return (
                <button onClick={()=>fetchRecipe(suggestionModal)} style={{ padding:"8px 18px",
                  borderRadius:7, border:"1px solid #2a2b30", background:"transparent",
                  color:"#b4b2c2", cursor:"pointer", fontSize:12, fontFamily:"sans-serif" }}>
                  Last inn oppskrift
                </button>
              );
              return (
                <>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:14 }}>
                    <div>
                      <div style={{ fontSize:10, color:"#a8a6b6", fontFamily:"sans-serif",
                        letterSpacing:"0.8px", marginBottom:8, fontWeight:600 }}>INGREDIENSER</div>
                      {recipe.components ? recipe.components.map((comp,ci) => (
                        <div key={ci} style={{ marginBottom: ci < recipe.components.length-1 ? 10 : 0 }}>
                          {recipe.components.length > 1 && (
                            <div style={{ fontSize:9, color:"#e8a838", fontFamily:"sans-serif",
                              fontWeight:600, marginBottom:3, letterSpacing:"0.5px" }}>{comp.name}</div>
                          )}
                          <ul style={{ margin:0, padding:0, listStyle:"none" }}>
                            {comp.ingredients?.map((ing,j) => (
                              <li key={j} style={{ fontSize:11, color:"#c8c0b4", fontFamily:"sans-serif",
                                padding:"3px 0", borderBottom:"1px solid #141517", display:"flex", gap:6 }}>
                                <span style={{ color:"#b4b2c2" }}>•</span>{ing}
                              </li>
                            ))}
                          </ul>
                        </div>
                      )) : (
                        <ul style={{ margin:0, padding:0, listStyle:"none" }}>
                          {recipe.ingredients?.map((ing,j) => (
                            <li key={j} style={{ fontSize:11, color:"#c8c0b4", fontFamily:"sans-serif",
                              padding:"3px 0", borderBottom:"1px solid #141517", display:"flex", gap:6 }}>
                              <span style={{ color:"#b4b2c2" }}>•</span>{ing}
                            </li>
                          ))}
                        </ul>
                      )}
                    </div>
                    <div>
                      <div style={{ fontSize:10, color:"#a8a6b6", fontFamily:"sans-serif",
                        letterSpacing:"0.8px", marginBottom:8, fontWeight:600 }}>FREMGANGSMÅTE</div>
                      <ol style={{ margin:0, padding:0, listStyle:"none" }}>
                        {recipe.steps?.map((step,j) => (
                          <li key={j} style={{ fontSize:11, color:"#c8c0b4", fontFamily:"sans-serif",
                            padding:"4px 0", borderBottom:"1px solid #141517", display:"flex", gap:8 }}>
                            <span style={{ color:"#e8a838", fontWeight:700, minWidth:16 }}>{j+1}.</span>{step}
                          </li>
                        ))}
                      </ol>
                    </div>
                  </div>
                  {recipe.nutrition && (
                    <div style={{ borderTop:"1px solid #22232a", paddingTop:14, marginBottom:14 }}>
                      <div style={{ fontSize:10, color:"#a8a6b6", fontFamily:"sans-serif",
                        letterSpacing:"0.8px", marginBottom:10, fontWeight:600 }}>
                        NÆRING PER PORSJON{recipe.portionWeightGrams ? <span style={{ fontWeight:400, color:"#747280", marginLeft:6 }}>· ca. {recipe.portionWeightGrams} g</span> : null}
                      </div>
                      <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                        {NUTRITION_FIELDS.map(f => ({label:f.label, val:`${recipe.nutrition[f.key]}${f.unit}`, color:f.color})).map(n => (
                          <div key={n.label} style={{ flex:"1 1 90px", display:"flex", flexDirection:"column",
                            alignItems:"center", padding:"10px 8px", background:"#1c1d21", borderRadius:8, gap:4 }}>
                            <span style={{ fontSize:14, fontWeight:700, color:n.color, fontFamily:"sans-serif" }}>{n.val}</span>
                            <span style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif" }}>{n.label}</span>
                          </div>
                        ))}
                        {recipe.pricePerPortion && (
                          <div style={{ flex:"1 1 90px", display:"flex", flexDirection:"column",
                            alignItems:"center", padding:"10px 8px", background:"#1c1d21", borderRadius:8, gap:4 }}>
                            <span style={{ fontSize:14, fontWeight:700, color:"#a8c4a8", fontFamily:"sans-serif" }}>
                              ca. {recipe.pricePerPortion.low}–{recipe.pricePerPortion.high} kr
                            </span>
                            <span style={{ fontSize:9, color:"#747280", fontFamily:"sans-serif" }}>
                              {recipe.pricePerPortion.source==="kassal" ? "kassal.app" : "AI-estimat"}
                            </span>
                            <span style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif" }}>Pris/porsjon</span>
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                  {recipe.tips?.length > 0 && (
                    <div style={{ paddingTop:12, borderTop:"1px solid #22232a" }}>
                      <div style={{ fontSize:10, color:"#a8a6b6", fontFamily:"sans-serif",
                        letterSpacing:"0.8px", marginBottom:8, fontWeight:600 }}>MEAL PREP-TIPS</div>
                      <ul style={{ margin:0, padding:0, listStyle:"none", display:"flex", flexDirection:"column", gap:6 }}>
                        {recipe.tips.map((tip,i) => (
                          <li key={i} style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
                            <span style={{ fontSize:13, flexShrink:0 }}>💡</span>
                            <span style={{ fontSize:12, color:"#c8c0d0", fontFamily:"sans-serif", lineHeight:1.5 }}>{tip}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  )}
                </>
              );
            })()}
          </div>
        </div>
      )}

      {/* ── PLAN DETAIL MODAL ── */}
      {planModal && (
        <div onClick={()=>{ saveNote(); setPlanModal(null); }}
          style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.78)", zIndex:200,
            display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
          <div onClick={e=>e.stopPropagation()} style={{ background:"#18191c", border:"1px solid #2a2b30",
            borderRadius:14, width:"100%", maxWidth:720, maxHeight:"88vh", overflowY:"auto", padding:24 }}>

            <div style={{ display:"flex", alignItems:"flex-start", gap:12, marginBottom:14 }}>
              <span style={{ fontSize:32 }}>{planModal.meal.emoji}</span>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:18, fontWeight:700, color:"#e4ddd0", marginBottom:4 }}>
                  {planModal.meal.name}
                </div>
                <div style={{ fontSize:12, color:"#a8a6b6", fontFamily:"sans-serif" }}>
                  {DAYS[planModal.day]}, uke {planModal.week+1} · ⏱ {planModal.meal.prepTime} · {portions} porsjoner
                </div>
              </div>
              <button onClick={()=>toggleFavourite(planModal.meal)} style={{ background:"transparent",
                border:"none", cursor:"pointer", fontSize:20, lineHeight:1, padding:4,
                color:isFavourite(planModal.meal)?"#e8a838":"#44424e" }}
                title={isFavourite(planModal.meal)?"Fjern fra favoritter":"Legg til favoritter"}>★</button>
              <button onClick={()=>{ saveNote(); setPlanModal(null); }} style={{ background:"transparent",
                border:"none", color:"#747280", cursor:"pointer", fontSize:20, lineHeight:1, padding:4 }}>✕</button>
            </div>

            <p style={{ margin:"0 0 18px", fontSize:13, color:"#a8a6b6", fontFamily:"sans-serif", lineHeight:1.6 }}>
              {planModal.meal.description}
            </p>

            {planModal.meal.leftover ? (
              <div style={{ padding:"20px 0", fontSize:13, color:"#747280", fontFamily:"sans-serif", fontStyle:"italic" }}>
                Denne dagen er satt av til rester. Ingen oppskrift nødvendig.
              </div>
            ) : recipeLoading===planModal.meal.name ? (
              <div style={{ textAlign:"center", padding:"24px 0", fontSize:13, color:"#747280", fontFamily:"sans-serif" }}>
                Laster oppskrift...
              </div>
            ) : !recipeCache[planModal.meal.name] ? (
              <button onClick={()=>fetchRecipe(planModal.meal)} style={{ padding:"7px 16px", borderRadius:7,
                border:"1px solid #2a2b30", background:"transparent", color:"#b4b2c2",
                cursor:"pointer", fontSize:12, fontFamily:"sans-serif", marginBottom:16 }}>
                Last inn oppskrift
              </button>
            ) : null}
            {!planModal.meal.leftover && recipeCache[planModal.meal.name] && (() => {
              const recipe = recipeCache[planModal.meal.name];
              return (
                <div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20, marginBottom:18 }}>
                    <div>
                      <div style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif",
                        letterSpacing:"0.8px", marginBottom:10, fontWeight:600 }}>INGREDIENSER</div>
                      {recipe.components ? recipe.components.map((comp,ci) => (
                        <div key={ci} style={{ marginBottom: ci < recipe.components.length-1 ? 12 : 0 }}>
                          {recipe.components.length > 1 && (
                            <div style={{ fontSize:10, color:"#e8a838", fontFamily:"sans-serif",
                              fontWeight:600, marginBottom:4, letterSpacing:"0.5px" }}>{comp.name}</div>
                          )}
                          <ul style={{ margin:0, padding:0, listStyle:"none" }}>
                            {comp.ingredients?.map((ing,j) => (
                              <li key={j} style={{ fontSize:13, color:"#d4cdc4", fontFamily:"sans-serif",
                                padding:"5px 0", borderBottom:"1px solid #22232a", display:"flex", gap:8 }}>
                                <span style={{ color:"#e8a838", marginTop:2 }}>•</span>{ing}
                              </li>
                            ))}
                          </ul>
                        </div>
                      )) : (
                        <ul style={{ margin:0, padding:0, listStyle:"none" }}>
                          {recipe.ingredients?.map((ing,j) => (
                            <li key={j} style={{ fontSize:13, color:"#d4cdc4", fontFamily:"sans-serif",
                              padding:"5px 0", borderBottom:"1px solid #22232a", display:"flex", gap:8 }}>
                              <span style={{ color:"#e8a838", marginTop:2 }}>•</span>{ing}
                            </li>
                          ))}
                        </ul>
                      )}
                    </div>
                    <div>
                      <div style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif",
                        letterSpacing:"0.8px", marginBottom:10, fontWeight:600 }}>FREMGANGSMÅTE</div>
                      <ol style={{ margin:0, padding:0, listStyle:"none" }}>
                        {recipe.steps?.map((step,j) => (
                          <li key={j} style={{ fontSize:13, color:"#d4cdc4", fontFamily:"sans-serif",
                            padding:"5px 0", borderBottom:"1px solid #22232a", display:"flex", gap:10 }}>
                            <span style={{ color:"#e8a838", fontWeight:700, minWidth:18, flexShrink:0 }}>{j+1}.</span>{step}
                          </li>
                        ))}
                      </ol>
                    </div>
                  </div>
                  {recipe.nutrition && (
                    <div style={{ borderTop:"1px solid #22232a", paddingTop:14, marginBottom:14 }}>
                      <div style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif",
                        letterSpacing:"0.8px", marginBottom:10, fontWeight:600 }}>
                        NÆRING PER PORSJON{recipe.portionWeightGrams ? <span style={{ fontWeight:400, color:"#747280", marginLeft:6 }}>· ca. {recipe.portionWeightGrams} g</span> : null}
                      </div>
                      <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                        {NUTRITION_FIELDS.map(f => ({label:f.label, val:`${recipe.nutrition[f.key]}${f.unit}`, color:f.color})).map(n => (
                          <div key={n.label} style={{ flex:"1 1 90px", display:"flex", flexDirection:"column",
                            alignItems:"center", padding:"10px 8px", background:"#1c1d21", borderRadius:8, gap:4 }}>
                            <span style={{ fontSize:14, fontWeight:700, color:n.color, fontFamily:"sans-serif" }}>{n.val}</span>
                            <span style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif" }}>{n.label}</span>
                          </div>
                        ))}
                        {recipe.pricePerPortion && (
                          <div style={{ flex:"1 1 90px", display:"flex", flexDirection:"column",
                            alignItems:"center", padding:"10px 8px", background:"#1c1d21", borderRadius:8, gap:4 }}>
                            <span style={{ fontSize:14, fontWeight:700, color:"#a8c4a8", fontFamily:"sans-serif" }}>
                              ca. {recipe.pricePerPortion.low}–{recipe.pricePerPortion.high} kr
                            </span>
                            <span style={{ fontSize:9, color:"#747280", fontFamily:"sans-serif" }}>
                              {recipe.pricePerPortion.source==="kassal" ? "kassal.app" : "AI-estimat"}
                            </span>
                            <span style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif" }}>Pris/porsjon</span>
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              );
            })()}

            {(() => {
              const recipe = recipeCache[planModal?.meal?.name];
              if (!recipe?.tips?.length) return null;
              return (
                <div style={{ borderTop:"1px solid #22232a", paddingTop:14, marginBottom:16 }}>
                  <div style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif",
                    letterSpacing:"0.8px", marginBottom:10, fontWeight:600 }}>MEAL PREP-TIPS</div>
                  <ul style={{ margin:0, padding:0, listStyle:"none", display:"flex", flexDirection:"column", gap:7 }}>
                    {recipe.tips.map((tip, i) => (
                      <li key={i} style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
                        <span style={{ fontSize:14, flexShrink:0 }}>💡</span>
                        <span style={{ fontSize:13, color:"#c8c0d0", fontFamily:"sans-serif", lineHeight:1.5 }}>{tip}</span>
                      </li>
                    ))}
                  </ul>
                </div>
              );
            })()}

            <div style={{ borderTop:"1px solid #22232a", paddingTop:14, marginBottom:16 }}>
              <div style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif",
                letterSpacing:"0.8px", marginBottom:8, fontWeight:600 }}>NOTATER</div>
              <textarea
                value={notesDraft}
                onChange={e=>setNotesDraft(e.target.value)}
                placeholder="f.eks. dobbel porsjon, uten chili, bytt ut kylling med tofu..."
                rows={2}
                style={{ width:"100%", background:"#141517", border:"1px solid #2a2b30",
                  borderRadius:6, padding:"8px 10px", color:"#e4ddd0", fontFamily:"sans-serif",
                  fontSize:12, resize:"vertical", lineHeight:1.5 }}
              />
            </div>

            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <button onClick={()=>{ saveNote(); setPlanModal(null); }} style={{ padding:"8px 18px",
                borderRadius:8, border:"1px solid #2a2b30", background:"transparent", color:"#b4b2c2",
                cursor:"pointer", fontSize:13, fontFamily:"sans-serif" }}>Lukk</button>
              <button onClick={()=>{ saveNote(); removeCell(planModal.week,planModal.day); setPlanModal(null); }}
                style={{ padding:"8px 20px", borderRadius:8, border:"1px solid #5a2a2a",
                  background:"#2a1818", color:"#d4a0a0", cursor:"pointer", fontSize:13,
                  fontFamily:"sans-serif", fontWeight:600 }}>🗑 Fjern fra plan</button>
            </div>
          </div>
        </div>
      )}

      </div>{/* end scroll container */}

      {/* ── Mobile bottom nav ── */}
      {isMobile && (
        <div style={{ flexShrink:0, background:"#18191c", borderTop:"1px solid #2a2b30", display:"flex", height:56 }}>
          {[
            { label:"Plan",         emoji:"📅", action:()=>{ setPlanModal(null); setSuggestionModal(null); setView("plan"); },                          key:"plan" },
            { label:"Handleliste",  emoji:"🛒", action:()=>{ setPlanModal(null); setSuggestionModal(null); generateShoppingList(shoppingWeek); },       key:"shopping" },
            { label:"Fryser",       emoji:"❄️", action:()=>{ setPlanModal(null); setSuggestionModal(null); setView("fryser"); },                        key:"fryser" },
            { label:"Innstillinger",emoji:"⚙",  action:()=>{ setPlanModal(null); setSuggestionModal(null); setView("settings"); },                     key:"settings" },
          ].map(tab => (
            <button key={tab.key} onClick={tab.action} style={{
              flex:1, display:"flex", flexDirection:"column", alignItems:"center",
              justifyContent:"center", gap:2, background:"transparent", border:"none",
              color: view===tab.key ? "#e8a838" : "#747280", cursor:"pointer",
              borderTop: view===tab.key ? "2px solid #e8a838" : "2px solid transparent",
              fontSize:10, fontFamily:"sans-serif"
            }}>
              <span style={{ fontSize:18 }}>{tab.emoji}</span>
              {tab.label}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
