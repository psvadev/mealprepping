<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scrollbar-gutter: stable; }
body { background: #0e0f11; color: #e4ddd0; font-family: 'Georgia', 'Times New Roman', serif; min-height: 100vh; zoom: 1.1; }
input, textarea, select, button { font-family: inherit; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #141517; }
::-webkit-scrollbar-thumb { background: #2a2b30; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a3b40; }
input[type="range"] { accent-color: #e8a838; cursor: pointer; height: 4px; }
input[type="range"]:focus { outline: none; }
* { -webkit-tap-highlight-color: transparent; }
textarea:focus, input:focus { outline: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ── Constants ──────────────────────────────────────────────────────────────
const DAYS = ["Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag","Søndag"];

const PROTEINS = [
  { key:"fisk",    label:"Fisk & Sjømat", emoji:"🐟", color:"#4a8aaa", bg:"#0d1420" },
  { key:"kylling", label:"Kylling",        emoji:"🍗", color:"#aa8a4a", bg:"#1e1610" },
  { key:"kjott",   label:"Kjøtt",          emoji:"🥩", color:"#aa4a4a", bg:"#1e1010" },
  { key:"vegeta",  label:"Vegetar",        emoji:"🥕", color:"#7abf7a", bg:"#141c14" },
];

const MEAL_CATEGORIES = [
  { key:"suppe",    label:"Suppe",      emoji:"🍲" },
  { key:"ovn",      label:"Ovnsrett",   emoji:"🫕" },
  { key:"gryte",    label:"Gryte",      emoji:"🥘" },
  { key:"pasta",    label:"Pasta/Ris",  emoji:"🍝" },
  { key:"kjapp",    label:"Kjapp",      emoji:"⚡" },
  { key:"salat",    label:"Salat/Lett", emoji:"🥗" },
  { key:"wrap",     label:"Wrap/Taco",  emoji:"🌮" },
  { key:"klassisk", label:"Klassisk",   emoji:"🍽️" },
];

const LEFTOVER_MEAL = { name:"Rester", emoji:"♻️", protein:"leftover", leftover:true, description:"Rester fra en annen dag." };

const CUISINE_LIBRARY = [
  { key:"norsk",       label:"Norsk/Nordisk",  emoji:"🐟" },
  { key:"italiensk",   label:"Italiensk",      emoji:"🍝" },
  { key:"asiatisk",    label:"Asiatisk",       emoji:"🍜" },
  { key:"meksikansk",  label:"Meksikansk",     emoji:"🌮" },
  { key:"indisk",      label:"Indisk",         emoji:"🍛" },
  { key:"japansk",     label:"Japansk",        emoji:"🍱" },
  { key:"kinesisk",    label:"Kinesisk",       emoji:"🥢" },
  { key:"thai",        label:"Thai",           emoji:"🌶️" },
  { key:"gresk",       label:"Gresk",          emoji:"🫒" },
  { key:"midtøsten",   label:"Midtøsten",      emoji:"🥙" },
  { key:"middelhavet", label:"Middelhavet",    emoji:"🌊" },
  { key:"spansk",      label:"Spansk",         emoji:"🥘" },
  { key:"fransk",      label:"Fransk",         emoji:"🥐" },
  { key:"amerikansk",  label:"Amerikansk",     emoji:"🍔" },
  { key:"vietnamesisk",label:"Vietnamesisk",   emoji:"🍲" },
  { key:"koreansk",    label:"Koreansk",       emoji:"🫕" },
  { key:"tyrkisk",     label:"Tyrkisk",        emoji:"🧆" },
  { key:"afrikansk",   label:"Afrikansk/Marokkansk", emoji:"🌍" },
  { key:"filippinsk",  label:"Filippinsk",           emoji:"🍚" },
];
const DEFAULT_ENABLED_CUISINES = ["norsk","italiensk","asiatisk","meksikansk","indisk"];

const SYSTEM_PROMPT = `Du er en matplanlegger-assistent for en norsk familie som driver med meal prepping. ALLE middager du foreslår MÅ være:
- Frysevennlig — egnet for å lage store porsjoner og fryse ned. Dette er ikke valgfritt.
- Meal-prep vennlig — kan forberedes i forveien og skaleres enkelt
- Laget av hele, ferske råvarer — IKKE ultraprosessert mat, ferdigmat eller halvfabrikata
- Variert og næringsrik
- Praktisk for en travel norsk familie

Bruk ALLTID norsk bokmål — aldri nynorsk eller dialekt (f.eks. "melk" ikke "mjølk", "to" ikke "tvo").
Svar ALLTID kun med gyldig JSON, ingen markdown, ingen forklaring utenfor JSON.`;

// ── localStorage helpers ───────────────────────────────────────────────────
const PFX = 'mp_';
function lsGet(key, fallback) {
  try { const v = localStorage.getItem(PFX + key); return v !== null ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function lsSet(key, value) {
  try { localStorage.setItem(PFX + key, JSON.stringify(value)); } catch {}
}

// ── Utilities ──────────────────────────────────────────────────────────────
function parseMeals(text) {
  try {
    const clean = text.replace(/```json[\s]*/gi,"").replace(/```[\s]*/g,"").trim();
    return JSON.parse(clean);
  } catch {
    try { const m = text.match(/\{[\s\S]*\}/); if (m) return JSON.parse(m[0]); } catch {}
    return null;
  }
}

function downloadFile(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}


// ── Small components ───────────────────────────────────────────────────────
function ProteinBadge({ protein }) {
  const p = PROTEINS.find(x => x.key === protein);
  if (!p) return null;
  return (
    <span style={{ fontSize:10, padding:"2px 7px", background:p.bg, borderRadius:10,
      color:p.color, fontFamily:"sans-serif", border:`1px solid ${p.color}44` }}>
      {p.emoji} {p.label}
    </span>
  );
}

function Stepper({ value, min=0, max=99, step=1, onChange, style={} }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:6, ...style }}>
      <button onClick={() => onChange(Math.max(min, value-step))}
        style={{ width:26, height:26, borderRadius:5, border:"1px solid #2a2b30",
          background:"transparent", color:"#b4b2c2", cursor:"pointer", fontSize:16,
          display:"flex", alignItems:"center", justifyContent:"center" }}>−</button>
      <span style={{ minWidth:24, textAlign:"center", fontSize:14, fontWeight:700,
        color:"#e8e0d0", fontFamily:"sans-serif" }}>{value}</span>
      <button onClick={() => onChange(Math.min(max, value+step))}
        style={{ width:26, height:26, borderRadius:5, border:"1px solid #2a2b30",
          background:"transparent", color:"#b4b2c2", cursor:"pointer", fontSize:16,
          display:"flex", alignItems:"center", justifyContent:"center" }}>+</button>
    </div>
  );
}

function CuisineCounter({ cuisine, value, onChange }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:8, background:"#18191c",
      border:"1px solid #22232a", borderRadius:8, padding:"8px 12px", flex:"1 1 150px" }}>
      <span style={{ fontSize:16 }}>{cuisine.emoji}</span>
      <span style={{ fontSize:12, color:"#b4b2c2", fontFamily:"sans-serif", flex:1 }}>{cuisine.label}</span>
      <Stepper value={value} min={0} max={7} onChange={onChange} />
      <span style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif" }}>/ uke</span>
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────────────────
function App() {
  // API keys
  const [anthropicKey, setAnthropicKey] = useState(() => lsGet('anthropicKey',''));
  const [kassalKey,    setKassalKey]    = useState(() => lsGet('kassalKey',''));

  // Planning state
  const [weeks,       setWeeks]       = useState(() => lsGet('weeks', 1));
  const [portions,    setPortions]    = useState(() => lsGet('portions', 4));
  const [plan,        setPlan]        = useState(() => lsGet('plan', Array.from({length:4},()=>Array(7).fill(null))));
  const [suggestions, setSuggestions] = useState(() => lsGet('suggestions', []));
  const [favourites,  setFavourites]  = useState(() => lsGet('favourites', []));
  const [mealHistory, setMealHistory] = useState(() => lsGet('mealHistory', []));
  const [mealNotes,   setMealNotes]   = useState(() => lsGet('mealNotes', {}));

  // Config
  const [proteinTargets,  setProteinTargets]  = useState(() => lsGet('proteinTargets',  {fisk:2,kylling:1,kjott:1,vegeta:0}));
  const [cuisineTargets,  setCuisineTargets]  = useState(() => lsGet('cuisineTargets',  {}));
  const [enabledCuisines, setEnabledCuisines] = useState(() => lsGet('enabledCuisines', DEFAULT_ENABLED_CUISINES));
  const [maxTime,         setMaxTime]         = useState(() => lsGet('maxTime', 60));
  const [exclusions,      setExclusions]      = useState(() => lsGet('exclusions', ''));
  const [suggestionCount, setSuggestionCount] = useState(() => lsGet('suggestionCount', 15));
  const [units,           setUnits]           = useState(() => lsGet('units', 'metric'));

  // UI state
  const [view,          setView]          = useState('plan');
  const [loading,       setLoading]       = useState(false);
  const [shoppingLists, setShoppingLists] = useState(() => lsGet('shoppingLists', {}));
  const [shoppingWeek,  setShoppingWeek]  = useState(0);
  const [shoppingLoading,setShoppingLoading] = useState(false);
  const [error,         setError]         = useState(null);
  const [activeCell,    setActiveCell]    = useState(null);
  const [dragMeal,      setDragMeal]      = useState(null);
  const [dragSource,    setDragSource]    = useState(null);
  const [expandedCard,  setExpandedCard]  = useState(null);
  const [planModal,     setPlanModal]     = useState(null);
  const [recipeCache,   setRecipeCache]   = useState(() => lsGet('recipeCache', {}));
  const [recipeLoading, setRecipeLoading] = useState(null);
  const [filterProtein,   setFilterProtein]   = useState(null);
  const [filterCategory,  setFilterCategory]  = useState(null);
  const [showProtein,   setShowProtein]   = useState(false);
  const [showCuisine,   setShowCuisine]   = useState(false);
  const [showFavourites,setShowFavourites]= useState(false);
  const [confirmClear,  setConfirmClear]  = useState(false);
  const [lastShoppingKeys,setLastShoppingKeys]=useState(() => lsGet('lastShoppingKeys',{}));
  const [notesDraft,    setNotesDraft]    = useState('');

  const importRef = useRef(null);

  // ── Browser back-button support ───────────────────────────────────────────
  useEffect(() => {
    history.replaceState({ view:'plan' }, '');
  }, []);
  useEffect(() => {
    if (view !== 'plan') history.pushState({ view }, '');
    else history.replaceState({ view:'plan' }, '');
  }, [view]);
  useEffect(() => {
    const onPop = (e) => { setView(e.state?.view || 'plan'); };
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  // ── Persistence ──────────────────────────────────────────────────────────
  useEffect(() => lsSet('anthropicKey',    anthropicKey),    [anthropicKey]);
  useEffect(() => lsSet('kassalKey',       kassalKey),       [kassalKey]);
  useEffect(() => lsSet('weeks',           weeks),           [weeks]);
  useEffect(() => lsSet('portions',        portions),        [portions]);
  useEffect(() => lsSet('plan',            plan),            [plan]);
  useEffect(() => lsSet('suggestions',     suggestions),     [suggestions]);
  useEffect(() => lsSet('favourites',      favourites),      [favourites]);
  useEffect(() => lsSet('mealHistory',     mealHistory),     [mealHistory]);
  useEffect(() => lsSet('mealNotes',       mealNotes),       [mealNotes]);
  useEffect(() => lsSet('proteinTargets',  proteinTargets),  [proteinTargets]);
  useEffect(() => lsSet('cuisineTargets',  cuisineTargets),  [cuisineTargets]);
  useEffect(() => lsSet('enabledCuisines', enabledCuisines), [enabledCuisines]);
  useEffect(() => lsSet('maxTime',         maxTime),         [maxTime]);
  useEffect(() => lsSet('exclusions',      exclusions),      [exclusions]);
  useEffect(() => lsSet('suggestionCount', suggestionCount), [suggestionCount]);
  useEffect(() => lsSet('units',           units),           [units]);
  useEffect(() => lsSet('recipeCache',     recipeCache),     [recipeCache]);
  useEffect(() => lsSet('shoppingLists',    shoppingLists),    [shoppingLists]);
  useEffect(() => lsSet('lastShoppingKeys', lastShoppingKeys), [lastShoppingKeys]);

  // Sync note draft when modal opens
  useEffect(() => {
    if (planModal) setNotesDraft(mealNotes[planModal.meal.name] || '');
  }, [planModal?.meal?.name]);

  // Close modal on Escape
  useEffect(() => {
    const onKey = (e) => {
      if (e.key !== 'Escape' || !planModal) return;
      setMealNotes(prev => ({...prev, [planModal.meal.name]: notesDraft}));
      setPlanModal(null);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [planModal, notesDraft]);

  // ── Computed ─────────────────────────────────────────────────────────────
  const allCuisines = useMemo(() => CUISINE_LIBRARY.filter(c => enabledCuisines.includes(c.key)), [enabledCuisines]);
  const totalTargeted = Object.values(proteinTargets).reduce((a,b)=>a+b, 0);
  const weekPlanKey = (w) => plan[w].map(m=>m?.name||'').join('|')+'|'+portions;
  const filledCount = plan.slice(0,weeks).flat().filter(Boolean).length;
  const totalSlots = weeks * 7;

  const proteinStats = useMemo(() => Array.from({length:weeks},(_,w)=>{
    const c = {fisk:0,kylling:0,kjott:0,vegeta:0};
    for (let d=0;d<7;d++) { const m=plan[w][d]; if (m?.protein && c[m.protein]!==undefined) c[m.protein]++; }
    return c;
  }), [plan, weeks]);

  const nutritionSummary = useMemo(() => Array.from({length:weeks},(_,w)=>{
    const t = {calories:0,protein:0,fat:0,carbs:0,fiber:0};
    let count = 0;
    for (let d=0;d<7;d++) {
      const m = plan[w][d]; if (!m) continue;
      const r = recipeCache[m.name]; if (!r?.nutrition) continue;
      t.calories += r.nutrition.calories||0; t.protein += r.nutrition.protein||0;
      t.fat += r.nutrition.fat||0; t.carbs += r.nutrition.carbs||0; t.fiber += r.nutrition.fiber||0;
      count++;
    }
    return { ...t, count };
  }), [plan, weeks, recipeCache]);

  const filteredSuggestions = useMemo(() => suggestions.filter(m => {
    if (filterProtein && m.protein !== filterProtein) return false;
    if (filterCategory && m.category !== filterCategory) return false;
    if (m.prepTime) { const mins=parseInt(m.prepTime); if (!isNaN(mins) && mins>maxTime) return false; }
    return true;
  }), [suggestions, filterProtein, filterCategory, maxTime]);

  // ── Meal history ─────────────────────────────────────────────────────────
  const addToHistory = useCallback((meal) => {
    setMealHistory(prev => prev.includes(meal.name) ? prev : [...prev, meal.name].slice(-100));
  }, []);

  // ── Meal assignment ───────────────────────────────────────────────────────
  const assignMeal = useCallback((meal, week, day) => {
    const existing = plan[week][day];
    setPlan(prev => { const next=prev.map(w=>[...w]); next[week][day]=meal; return next; });
    if (!meal.leftover) setSuggestions(prev => {
      let next = prev.filter(m=>m.name!==meal.name);
      if (existing && !existing.leftover && !next.find(m=>m.name===existing.name)) next=[...next,existing];
      return next;
    });
    if (!meal.leftover) addToHistory(meal);
    setActiveCell(null);
  }, [plan, addToHistory]);

  const removeCell = useCallback((week, day) => {
    const meal = plan[week][day];
    setPlan(prev => { const next=prev.map(w=>[...w]); next[week][day]=null; return next; });
    if (meal) setSuggestions(prev => prev.find(m=>m.name===meal.name) ? prev : [...prev, meal]);
  }, [plan]);

  const clearPlan = () => {
    setPlan(Array.from({length:4},()=>Array(7).fill(null)));
    setSuggestions([]);
    setShoppingLists({});
    setLastShoppingKeys({});
    setConfirmClear(false);
  };

  // ── Favourites ────────────────────────────────────────────────────────────
  const toggleFavourite = (meal) => setFavourites(prev =>
    prev.find(m=>m.name===meal.name) ? prev.filter(m=>m.name!==meal.name) : [...prev, meal]
  );
  const isFavourite = (meal) => favourites.some(m=>m.name===meal.name);

  // ── Units ─────────────────────────────────────────────────────────────────
  const changeUnits = (newUnits) => {
    if (newUnits === units) return;
    setUnits(newUnits);
    setRecipeCache({});
    setShoppingLists({});
    setLastShoppingKeys({});
  };

  // ── Cuisine enable/disable ────────────────────────────────────────────────
  const enableCuisine = (key) => setEnabledCuisines(prev => prev.includes(key) ? prev : [...prev, key]);
  const disableCuisine = (key) => {
    setEnabledCuisines(prev => prev.filter(k => k !== key));
    setCuisineTargets(prev => { const n={...prev}; delete n[key]; return n; });
  };

  // ── Kassal prices ─────────────────────────────────────────────────────────
  const fetchKassalPrice = useCallback(async (ingredients) => {
    if (!kassalKey) return null;
    const skip = ["salt","vann","pepper","krydder","olje","smør","hvitløk","sukker","mel","saus","kraft"];
    const adjectives = ["tørket","hermetiske","hermetisk","fersk","ferskpresset","hakket","malt","revet","skivet","kokt","rå","frossen","frosne"];
    const targets = ingredients.filter(i=>!skip.some(s=>i.toLowerCase().includes(s))).slice(0,4);
    let total=0, found=0;
    for (const ing of targets) {
      const stripped = ing.replace(/^[\d.,\s]+(g|kg|dl|l|stk|ss|ts|pk|boks|bokser|pose|skive|skiver|fedd|cm)?\s*/i,"").trim();
      if (!stripped || stripped.length<3) continue;
      // Take the first non-adjective word, strip any special characters
      const words = stripped.split(/\s+/).map(w => w.replace(/[^a-zA-Z0-9æøåÆØÅ]/g,""));
      const mainWord = words.find(w => w.length>=3 && !adjectives.includes(w.toLowerCase())) || words.find(w=>w.length>=3);
      if (!mainWord) continue;
      try {
        const r = await fetch(`https://kassal.app/api/v1/products?search=${encodeURIComponent(mainWord)}&size=5`,
          { headers:{ Authorization:`Bearer ${kassalKey}` } });
        const d = await r.json();
        const prices = (d?.data||[]).map(p=>p.current_price).filter(Boolean);
        if (prices.length) { total+=Math.min(...prices); found++; }
      } catch {}
    }
    if (found<1) return null;
    const base = total/portions;
    return { low:Math.round(base*0.85), high:Math.round(base*1.2), source:"kassal" };
  }, [kassalKey, portions]);

  // ── Recipe fetch ──────────────────────────────────────────────────────────
  const fetchRecipe = useCallback(async (meal) => {
    if (recipeCache[meal.name] || !anthropicKey) return;
    setRecipeLoading(meal.name);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key": anthropicKey,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body: JSON.stringify({
          model:"claude-sonnet-4-6",
          max_tokens:1500,
          system:"Du er en kokk-assistent. Bruk norsk bokmål. Svar ALLTID kun med gyldig JSON, ingen markdown, ingen forklaring utenfor JSON.",
          messages:[{
            role:"user",
            content:`Svar alltid på norsk bokmål.\n\nGi oppskrift for ${portions} porsjoner og næringsinnhold per porsjon for: ${meal.name}\n\nSkaler ingredienser til ${portions} porsjoner. Næringsinnhold skal være per porsjon (1 av ${portions}).\n\n${units === 'imperial'
              ? "Bruk imperiale mål (oz, lbs, cups, fl oz, tbsp, tsp)."
              : "Bruk metriske mål (gram, kg, dl, ml, liter)."
            }\nInkluder prisestimat basert på norske butikkpriser (Rema, Kiwi, Meny).\n\nDette er en "reheat and eat" meal prep-app. Familien lager ALT på én batch-dag, fryser ned i porsjoner, og middagen er kun å varme opp og spise – ingen tilberedning ved servering. Inkluder 1–3 praktiske tips under "tips" om: hvordan retten best pakkes og fryses, og hvordan den varmes opp best (ovn, mikro, panne med litt vann osv.). Unngå tips om ferske sider, ingredienser som tilberedes ved servering, eller noe som lages "i forveien" – alt skjer på batch-dagen. Vær spesifikk per rett.\nSvar med dette JSON-formatet:\n{\n  "components": [\n    { "name": "Kjøttboller", "ingredients": ["500g kjøttdeig", "1 egg", "salt og pepper"] },\n    { "name": "Tomatsaus", "ingredients": ["2 bokser hermetiske tomater", "1 løk", "2 fedd hvitløk"] }\n  ],\n  "steps": ["Forvarm ovnen til 200°C.", "Krydre kyllingen og brun i panne."],\n  "nutrition": { "calories": 420, "protein": 38, "fat": 14, "carbs": 28, "fiber": 5 },\n  "pricePerPortion": { "low": 45, "high": 65 },\n  "tips": ["Sausen kan lages 3–4 dager i forveien og fryses i porsjonsbokser.", "Kok pasta ferskt rett før servering — tar kun 10 min."]\n}\nHvis retten er enkel og ikke har naturlige delkomponenter, bruk én komponent med rettens navn. Del alltid opp i komponenter der det gir mening (f.eks. saus, bunn, fyll, marinade, tilbehør).`
          }]
        })
      });
      const data = await res.json();
      const text = data.content?.find(b=>b.type==="text")?.text||"";
      const parsed = parseMeals(text);
      if (parsed) {
        const flatIngredients = parsed.components ? parsed.components.flatMap(c=>c.ingredients) : parsed.ingredients;
        if (kassalKey && flatIngredients?.length) {
          const kp = await fetchKassalPrice(flatIngredients);
          if (kp) parsed.pricePerPortion = kp;
        }
        setRecipeCache(prev => ({...prev, [meal.name]:parsed}));
      }
    } catch {}
    setRecipeLoading(null);
  }, [recipeCache, anthropicKey, kassalKey, fetchKassalPrice, portions, units]);

  const fetchAllRecipes = async () => {
    const meals = plan.slice(0,weeks).flat().filter(m => m && !m.leftover && !recipeCache[m.name]);
    const unique = [...new Map(meals.map(m=>[m.name,m])).values()];
    for (const meal of unique) await fetchRecipe(meal);
  };

  const toggleCard = (meal) => {
    if (activeCell) { assignMeal(meal, activeCell.week, activeCell.day); return; }
    if (expandedCard===meal.name) { setExpandedCard(null); return; }
    setExpandedCard(meal.name);
  };

  // ── Generate suggestions ──────────────────────────────────────────────────
  const generateSuggestions = useCallback(async () => {
    if (!anthropicKey) { setError("Legg inn Anthropic API-nøkkel i Innstillinger."); return; }
    setLoading(true); setError(null); setSuggestions([]);
    const targets = PROTEINS.map(p=>`${p.label}: ca. ${proteinTargets[p.key]}x per uke`).join(", ");
    const cuisineGoals = allCuisines.filter(c=>(cuisineTargets[c.key]||0)>0)
      .map(c=>`${c.label}: ca. ${cuisineTargets[c.key]}x per uke`).join(", ");
    const cuisineLine   = cuisineGoals ? `\nKjøkkenmål per uke (veiledende): ${cuisineGoals}.` : "";
    const exclusionLine = exclusions.trim() ? `\nUngå disse ingrediensene/allergenene: ${exclusions.trim()}.` : "";
    const alreadyPlanned = plan.flat().filter(Boolean).map(m=>m.name);
    const avoidLine     = alreadyPlanned.length ? `\nDisse er allerede planlagt, ikke gjenta dem: ${alreadyPlanned.join(", ")}.` : "";
    const historyLine   = mealHistory.length ? `\nMathistorikk (nylig brukt, unngå gjentakelse): ${mealHistory.slice(-30).join(", ")}.` : "";
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key": anthropicKey,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body: JSON.stringify({
          model:"claude-sonnet-4-6",
          max_tokens: Math.max(3000, suggestionCount*weeks*220),
          system: SYSTEM_PROMPT,
          messages:[{
            role:"user",
            content:`Svar alltid på norsk bokmål.\n\nForeslå ${suggestionCount * weeks} middager for en norsk familie (${suggestionCount} per uke, ${weeks} uke${weeks>1?"r":""}). Hver rett lages i ${portions} porsjoner.
Familien ønsker omtrent denne proteinfordelingen per uke (veiledende, ikke absolutt): ${targets}.
Alle middager skal ha forberedelsestid på MAKS ${maxTime} minutter.${cuisineLine}${exclusionLine}${avoidLine}${historyLine}
Familien bruker noen timer én dag i uken på å lage alt på én gang. ALT fryses ned i porsjoner – middagen er kun å ta frem en porsjon fra fryseren og varme opp. Ingen tilberedning ved servering. Hele retten lages ferdig på batch-dagen, inkludert grønnsaker og tilbehør. Foretrekk gryter, supper, sauser og ovnsretter der alt er integrert og smaker like godt etter frysing og oppvarming. Unngå retter som krever ferske komponenter ved servering.
Gi god variasjon i kjøkken og tilberedningsmetode: norske klassikere, asiatisk inspirert, middelhavet, supper, ovnsretter osv. IKKE gjenta samme rett eller veldig like retter.

Svar med dette JSON-formatet:
{
  "meals": [
    {
      "name": "Norsk navn på retten",
      "emoji": "🍲",
      "prepTime": "30 min",
      "freezer": true,
      "protein": "fisk",
      "category": "suppe",
      "tags": ["norsk", "ovnsrett"],
      "description": "Kort beskrivelse på 1 setning"
    }
  ]
}
Mulige verdier for "protein": "fisk", "kylling", "kjott", "vegeta".
Mulige verdier for "category": "suppe", "ovn", "gryte", "pasta", "kjapp", "salat", "wrap", "klassisk".`
          }]
        })
      });
      const data = await res.json();
      if (!res.ok) {
        setError(`API-feil ${res.status}: ${data?.error?.message||JSON.stringify(data)}`);
        setLoading(false); return;
      }
      const text = data.content?.find(b=>b.type==="text")?.text||"";
      const parsed = parseMeals(text);
      if (parsed?.meals) setSuggestions(parsed.meals);
      else setError(`Kunne ikke tolke svar. Rå respons: ${text.slice(0,200)}`);
    } catch (err) { setError(`Nettverksfeil: ${err.message}`); }
    setLoading(false);
  }, [anthropicKey, portions, proteinTargets, maxTime, exclusions, allCuisines, cuisineTargets, suggestionCount, plan, mealHistory]);

  // ── Shopping list ─────────────────────────────────────────────────────────
  const generateShoppingList = async (week, force=false) => {
    if (week === undefined) week = shoppingWeek;
    const plannedMeals = [];
    for (let d=0;d<7;d++) if (plan[week]?.[d] && !plan[week][d].leftover) plannedMeals.push(plan[week][d].name);
    if (!plannedMeals.length) { setError(`Ingen middager planlagt for uke ${week+1}.`); setView("shopping"); return; }
    setShoppingWeek(week);
    setView("shopping");
    const wKey = weekPlanKey(week);
    if (!force && shoppingLists[week] && wKey===lastShoppingKeys[week]) return;
    if (!anthropicKey) { setError("Legg inn Anthropic API-nøkkel i Innstillinger."); return; }
    setShoppingLoading(true); setError(null);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key": anthropicKey,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body: JSON.stringify({
          model:"claude-sonnet-4-6",
          max_tokens:3000,
          system: SYSTEM_PROMPT,
          messages:[{
            role:"user",
            content:`Svar alltid på norsk bokmål.\n\nLag en handleliste for uke ${week+1}. Hver rett skal gi ${portions} porsjoner:\n${plannedMeals.map((m,i)=>`${i+1}. ${m}`).join("\n")}\n\nGrupper ingrediensene i kategorier. Skaler mengder til ${portions} porsjoner per rett. ${units === 'imperial'
              ? "Bruk imperiale mål (oz, lbs, cups, fl oz, tbsp, tsp)."
              : "Bruk metriske mål (gram, kg, dl, ml, liter)."
            } Inkluder prisestimat per kategori og totalt, basert på norske butikkpriser.\nSvar med dette JSON-formatet:\n{\n  "categories": [\n    {\n      "name": "Kjøtt og fisk",\n      "emoji": "🥩",\n      "price": { "low": 120, "high": 160 },\n      "items": [{ "name": "Kyllingfileter", "amount": "1.2 kg" }]\n    }\n  ],\n  "totalPrice": { "low": 450, "high": 620 }\n}`
          }]
        })
      });
      const data = await res.json();
      const text = data.content?.find(b=>b.type==="text")?.text||"";
      const parsed = parseMeals(text);
      if (parsed?.categories) {
        setShoppingLists(prev=>({...prev,[week]:parsed}));
        setLastShoppingKeys(prev=>({...prev,[week]:wKey}));
      } else setError("Kunne ikke generere handleliste.");
    } catch { setError("Nettverksfeil."); }
    setShoppingLoading(false);
  };

  // ── Export / import ───────────────────────────────────────────────────────
  const exportPlan = () => {
    const data = { weeks, portions, plan, suggestions, proteinTargets, maxTime, exclusions,
      cuisineTargets, enabledCuisines, suggestionCount, units, shoppingLists, favourites, mealNotes,
      mealHistory, exportedAt: new Date().toISOString() };
    const date = new Date().toISOString().split('T')[0];
    downloadFile(JSON.stringify(data, null, 2), `middagsplan-${date}.json`, 'application/json');
  };

  const importPlan = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.plan) setPlan(d.plan);
        if (d.weeks) setWeeks(d.weeks);
        if (d.portions) setPortions(d.portions);
        if (d.suggestions) setSuggestions(d.suggestions);
        if (d.proteinTargets) setProteinTargets(d.proteinTargets);
        if (d.maxTime) setMaxTime(d.maxTime);
        if (d.exclusions!==undefined) setExclusions(d.exclusions);
        if (d.cuisineTargets) setCuisineTargets(d.cuisineTargets);
        if (d.enabledCuisines) setEnabledCuisines(d.enabledCuisines);
        if (d.units) setUnits(d.units);
        if (d.shoppingLists) setShoppingLists(d.shoppingLists);
        if (d.suggestionCount) setSuggestionCount(d.suggestionCount);
        if (d.favourites) setFavourites(d.favourites);
        if (d.mealNotes) setMealNotes(d.mealNotes);
        if (d.mealHistory) setMealHistory(d.mealHistory);
        setError(null);
      } catch { setError("Kunne ikke lese filen. Sjekk at det er en gyldig middagsplan-fil."); }
    };
    reader.readAsText(file);
    e.target.value="";
  };

  const exportShoppingList = () => {
    const sl = shoppingLists[shoppingWeek];
    if (!sl) return;
    const date = new Date().toLocaleDateString("nb-NO");
    const header = `Handleliste uke ${shoppingWeek+1} — ${portions} porsjoner per rett\nGenerert ${date}\n\n`;
    const lines = sl.categories.map(cat =>
      `${cat.emoji} ${cat.name}${cat.price ? ` (ca. ${cat.price.low}–${cat.price.high} kr)` : ""}\n${cat.items.map(i=>`  - ${i.name}: ${i.amount}`).join("\n")}`
    ).join("\n\n");
    const price = sl.totalPrice
      ? `\n\nEstimert totalpris: ca. ${sl.totalPrice.low}–${sl.totalPrice.high} kr`
      : "";
    downloadFile(header+lines+price, `handleliste-uke${shoppingWeek+1}.txt`, 'text/plain;charset=utf-8');
  };

  const printPlan = () => {
    const rows = Array.from({length:weeks},(_,w) => {
      const cells = DAYS.map((d,di) => {
        const meal = plan[w][di];
        return `<td>${meal ? meal.emoji+" "+meal.name : "<span class='empty'>—</span>"}</td>`;
      }).join("");
      return `<tr><td>Uke ${w+1}</td>${cells}</tr>`;
    }).join("");

    const sl = shoppingLists[shoppingWeek];
    const shoppingHtml = sl ? `
      <h2 style="margin:32px 0 12px;font-size:16px">🛒 Handleliste uke ${shoppingWeek+1} — ${portions} porsjoner per rett</h2>
      ${sl.totalPrice ? `<p class="price">Estimert totalpris: ca. ${sl.totalPrice.low}–${sl.totalPrice.high} kr</p>` : ""}
      <div style="display:flex;flex-wrap:wrap;gap:16px">
        ${sl.categories.map(cat=>`<div class="cat-box">
          <div class="cat-title">${cat.emoji} ${cat.name}</div>
          <ul>${cat.items.map(i=>`<li>${i.name} — ${i.amount}</li>`).join("")}</ul>
        </div>`).join("")}
      </div>` : "";

    const html = `<!DOCTYPE html><html lang="nb"><head><meta charset="utf-8"><title>Middagsplan</title>
      <style>
        body{font-family:sans-serif;padding:24px;max-width:1000px;margin:0 auto;background:#0e0f11;color:#e4ddd0}
        h1,h2{color:#e4ddd0}
        table{border-collapse:collapse;width:100%}
        th,td{border:1px solid #2a2b30;padding:8px 10px;font-size:12px}
        thead th{background:#18191c;color:#b4b2c2;font-size:11px}
        tbody td{background:#141517;vertical-align:top;min-width:80px}
        td:first-child{background:#18191c;color:#747280;font-size:11px;font-weight:600;white-space:nowrap}
        .empty{color:#3a3b40}
        .cat-title{font-weight:700;font-size:13px;margin-bottom:6px;color:#e8a838}
        .cat-box{min-width:180px}
        ul{margin:0;padding-left:16px;font-size:12px;color:#b4b2c2}
        .meta{color:#747280;font-size:12px;margin-bottom:20px}
        .price{font-size:12px;color:#747280;margin-bottom:12px}
        .print-btn{padding:8px 20px;cursor:pointer;background:#22232a;border:1px solid #2a2b30;color:#e8a838;border-radius:6px;font-size:13px}
        @media print{body{background:#fff;color:#111}th,td{border-color:#ccc}thead th{background:#f0f0f0;color:#333}tbody td{background:#fff}td:first-child{background:#f8f8f8;color:#555}.print-btn{display:none}}
      </style>
      </head><body>
      <h1 style="font-size:20px;margin-bottom:4px">🥦 Hva skal vi ha til middag?</h1>
      <p class="meta">Generert ${new Date().toLocaleDateString("nb-NO")} · ${portions} porsjoner per rett</p>
      <table>
        <thead><tr><th style="text-align:left"></th>
          ${DAYS.map(d=>`<th>${d}</th>`).join("")}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${shoppingHtml}
      <p style="margin-top:32px"><button onclick="window.print()" class="print-btn">Skriv ut</button></p>
      </body></html>`;

    const win = window.open('','_blank');
    if (!win) { setError("Popup-blokkering er aktiv. Tillat popup-vinduer for denne siden og prøv igjen."); return; }
    win.document.write(html); win.document.close(); win.focus();
  };

  // ── Notes ─────────────────────────────────────────────────────────────────
  const saveNote = () => {
    if (!planModal) return;
    setMealNotes(prev => ({...prev, [planModal.meal.name]: notesDraft}));
  };

  // ── Shared button styles ──────────────────────────────────────────────────
  const btnTab = (active) => ({
    padding:"6px 14px", borderRadius:6,
    border: active ? "2px solid #e8a838" : "1px solid #2a2b30",
    background: active ? "#22232a" : "transparent",
    color: active ? "#e8e0d0" : "#b4b2c2",
    cursor:"pointer", fontSize:12, fontFamily:"sans-serif"
  });

  const btnIcon = () => ({
    padding:"6px 12px", borderRadius:6, border:"1px solid #2a2b30",
    background:"transparent", color:"#b4b2c2", cursor:"pointer", fontSize:12, fontFamily:"sans-serif"
  });

  // ──────────────────────────────────────────────────────────────────────────
  // RENDER
  // ──────────────────────────────────────────────────────────────────────────
  return (
    <div style={{ minHeight:"100vh", background:"#0e0f11", paddingBottom:60 }}>

      {/* ── Header ── */}
      <div style={{ background:"linear-gradient(180deg,#1a1b1e 0%,#0e0f11 100%)",
        borderBottom:"1px solid #2a2b30", padding:"20px 20px 14px", position:"sticky", top:0, zIndex:100 }}>
        <div style={{ maxWidth:1000, margin:"0 auto" }}>

          {/* Title row */}
          <div style={{ display:"flex", alignItems:"baseline", gap:10, marginBottom:2 }}>
            <span style={{ fontSize:22 }}>🧊</span>
            <h1 style={{ fontSize:19, fontWeight:700, letterSpacing:"-0.5px", margin:0, color:"#e8e0d0" }}>
              Reheat & Eat
            </h1>
          </div>
          <p style={{ margin:0, fontSize:11, color:"#747280", fontFamily:"sans-serif" }}>
            Lag alt på én dag — frys ned — varm opp og spis
          </p>

          {/* Controls row */}
          <div style={{ display:"flex", gap:10, marginTop:12, flexWrap:"wrap", alignItems:"center" }}>

            {/* Uker */}
            <div style={{ display:"flex", alignItems:"center", gap:5 }}>
              <span style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif", letterSpacing:"0.5px" }}>UKE</span>
              {[1,2,3,4].map(w => (
                <button key={w} onClick={()=>setWeeks(w)} style={{
                  width:28, height:28, borderRadius:5,
                  border: weeks===w ? "2px solid #e8a838" : "1px solid #2a2b30",
                  background: weeks===w ? "#22232a" : "transparent",
                  color: weeks===w ? "#e8e0d0" : "#b4b2c2",
                  cursor:"pointer", fontSize:13, fontFamily:"sans-serif", fontWeight: weeks===w ? 700 : 400
                }}>{w}</button>
              ))}
            </div>

            {/* Porsjoner */}
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <span style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif", letterSpacing:"0.5px" }}>PORSJONER</span>
              <Stepper value={portions} min={1} max={20} onChange={setPortions} />
              <span style={{ fontSize:10, color:"#4a4858", fontFamily:"sans-serif" }}>per rett</span>
            </div>

            {/* Proteinmål */}
            <button onClick={()=>{setShowProtein(s=>!s);setShowCuisine(false);}} style={{
              display:"flex", alignItems:"center", gap:6, padding:"5px 12px", borderRadius:6,
              border: showProtein ? "2px solid #e8a838" : "1px solid #2a2b30",
              background: showProtein ? "#22232a" : "transparent",
              color: showProtein ? "#e8e0d0" : "#b4b2c2", cursor:"pointer", fontSize:12, fontFamily:"sans-serif"
            }}>
              🎯 Proteinmål
              {totalTargeted>0 && <span style={{ background:"#2a2b30", borderRadius:10, padding:"1px 6px", fontSize:10, color:"#e8a838" }}>{totalTargeted}/uke</span>}
            </button>

            {/* Kjøkken */}
            <button onClick={()=>{setShowCuisine(s=>!s);setShowProtein(false);}} style={{
              display:"flex", alignItems:"center", gap:5, padding:"5px 12px", borderRadius:6,
              border: showCuisine ? "2px solid #e8a838" : "1px solid #2a2b30",
              background: showCuisine ? "#22232a" : "transparent",
              color: showCuisine ? "#e8e0d0" : "#b4b2c2", cursor:"pointer", fontSize:12, fontFamily:"sans-serif"
            }}>🌍 Kjøkken</button>

            {/* Max tid */}
            <div style={{ display:"flex", alignItems:"center", gap:8, background:"#18191c",
              border:"1px solid #22232a", borderRadius:7, padding:"5px 12px" }}>
              <span style={{ fontSize:10, color:"#b4b2c2", fontFamily:"sans-serif", whiteSpace:"nowrap" }}>⏱ Maks</span>
              <input type="range" min={15} max={120} step={15} value={maxTime} onChange={e=>setMaxTime(Number(e.target.value))}
                style={{ width:72, accentColor:"#e8a838" }} />
              <span style={{ fontSize:12, fontWeight:700, color:"#e8e0d0", fontFamily:"sans-serif", minWidth:42 }}>{maxTime} min</span>
            </div>

            {/* View tabs + actions */}
            <div style={{ marginLeft:"auto", display:"flex", gap:5, flexWrap:"wrap", alignItems:"center" }}>
              <button onClick={()=>setView("plan")} style={btnTab(view==="plan")}>📅 Plan</button>
              <button onClick={()=>generateShoppingList(shoppingWeek)} style={btnTab(view==="shopping")}>
                🛒 Handleliste{filledCount>0 ? ` (${filledCount})` : ""}
              </button>
              <button onClick={()=>setView("settings")} style={btnTab(view==="settings")}>⚙ Innstillinger</button>
              <div style={{ width:1, background:"#2a2b30", margin:"4px 2px", alignSelf:"stretch" }} />
              <button onClick={exportPlan} title="Last ned plan som JSON" style={btnIcon()}>⬇ Lagre</button>
              <button onClick={()=>importRef.current?.click()} title="Last inn lagret plan" style={btnIcon()}>⬆ Last inn</button>
              <button onClick={printPlan} title="Skriv ut / del plan" style={btnIcon()}>🖨 Skriv ut</button>
              <button onClick={()=>setConfirmClear(true)} title="Tøm planen" style={{
                ...btnIcon(), border:"1px solid #3a2a2a", color:"#907070"
              }}>✕ Tøm</button>
              <input ref={importRef} type="file" accept=".json" onChange={importPlan} style={{ display:"none" }} />
            </div>
          </div>

          {/* Protein panel */}
          {showProtein && (
            <div style={{ marginTop:12, padding:"14px 16px", background:"#141517",
              borderRadius:10, border:"1px solid #22232a" }}>
              <div style={{ fontSize:10, color:"#a8a6b6", fontFamily:"sans-serif",
                marginBottom:10, letterSpacing:"0.5px", fontWeight:600 }}>
                PROTEINMÅL PER UKE — veiledning for AI
              </div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                {PROTEINS.map(p => (
                  <div key={p.key} style={{ display:"flex", alignItems:"center", gap:8, background:"#18191c",
                    border:"1px solid #22232a", borderRadius:8, padding:"8px 12px", flex:"1 1 140px" }}>
                    <span style={{ fontSize:16 }}>{p.emoji}</span>
                    <span style={{ fontSize:12, color:"#b4b2c2", fontFamily:"sans-serif", flex:1 }}>{p.label}</span>
                    <Stepper value={proteinTargets[p.key]} min={0} max={7}
                      onChange={v=>setProteinTargets(prev=>({...prev,[p.key]:v}))} />
                    <span style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif" }}>/ uke</span>
                  </div>
                ))}
              </div>
              {totalTargeted>7 && (
                <div style={{ marginTop:8, fontSize:11, color:"#aa7a4a", fontFamily:"sans-serif" }}>
                  ⚠ Totalt {totalTargeted} målsatte middager overstiger 7 dager — AI gjør sitt beste.
                </div>
              )}
              <div style={{ marginTop:12, borderTop:"1px solid #22232a", paddingTop:12 }}>
                <div style={{ fontSize:10, color:"#a8a6b6", fontFamily:"sans-serif", marginBottom:6, letterSpacing:"0.5px", fontWeight:600 }}>
                  UTELAT INGREDIENSER / ALLERGENER
                </div>
                <input type="text" value={exclusions} onChange={e=>setExclusions(e.target.value)}
                  placeholder="f.eks. nøtter, reker, gluten..."
                  style={{ width:"100%", background:"#18191c", border:"1px solid #2a2b30", borderRadius:6,
                    padding:"7px 10px", color:"#e4ddd0", fontFamily:"sans-serif", fontSize:12 }} />
              </div>
            </div>
          )}

          {/* Cuisine panel */}
          {showCuisine && (
            <div style={{ marginTop:12, padding:"14px 16px", background:"#141517",
              borderRadius:10, border:"1px solid #22232a" }}>
              <div style={{ fontSize:10, color:"#a8a6b6", fontFamily:"sans-serif",
                marginBottom:10, letterSpacing:"0.5px", fontWeight:600 }}>
                KJØKKENMÅL PER UKE — veiledning for AI
              </div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:12 }}>
                {allCuisines.map(cuisine => (
                  <div key={cuisine.key} style={{ position:"relative" }}>
                    <CuisineCounter cuisine={cuisine}
                      value={cuisineTargets[cuisine.key]||0}
                      onChange={v=>setCuisineTargets(prev=>({...prev,[cuisine.key]:v}))} />
                    <button onClick={()=>disableCuisine(cuisine.key)} title="Fjern kjøkken"
                      style={{ position:"absolute", top:-6, right:-6, width:18, height:18,
                        background:"#2a1818", border:"1px solid #5a2a2a", borderRadius:"50%",
                        color:"#d08080", cursor:"pointer", fontSize:10, display:"flex",
                        alignItems:"center", justifyContent:"center", lineHeight:1 }}>✕</button>
                  </div>
                ))}
              </div>
              {/* Add from library */}
              {CUISINE_LIBRARY.filter(c => !enabledCuisines.includes(c.key)).length > 0 && (
                <div style={{ borderTop:"1px solid #22232a", paddingTop:10 }}>
                  <div style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif", marginBottom:6 }}>Legg til kjøkken:</div>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                    {CUISINE_LIBRARY.filter(c => !enabledCuisines.includes(c.key)).map(c => (
                      <button key={c.key} onClick={()=>enableCuisine(c.key)}
                        style={{ display:"flex", alignItems:"center", gap:4, padding:"4px 10px",
                          borderRadius:6, border:"1px dashed #2a2b30", background:"transparent",
                          color:"#b4b2c2", cursor:"pointer", fontSize:11, fontFamily:"sans-serif" }}>
                        <span>{c.emoji}</span><span>{c.label}</span>
                        <span style={{ color:"#e8a838", fontWeight:700, fontSize:13 }}>+</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* ── Main content ── */}
      <div style={{ maxWidth:1000, margin:"0 auto", padding:"18px 16px" }}>

        {error && (

                  color: loading ? "#a8a6b6" : "#0e0f11",

              </div>

              </div>
            ) : recipeLoading===planModal.meal.name ? (
              <div style={{ textAlign:"center", padding:"24px 0", fontSize:13, color:"#747280", fontFamily:"sans-serif" }}>
                Laster oppskrift...
              </div>
            ) : !recipeCache[planModal.meal.name] ? (
              <button onClick={()=>fetchRecipe(planModal.meal)} style={{ padding:"7px 16px", borderRadius:7,
                border:"1px solid #2a2b30", background:"transparent", color:"#b4b2c2",
                cursor:"pointer", fontSize:12, fontFamily:"sans-serif", marginBottom:16 }}>
                Last inn oppskrift
              </button>
            ) : null}
            {!planModal.meal.leftover && recipeCache[planModal.meal.name] && (() => {
              const recipe = recipeCache[planModal.meal.name];
              return (
                <div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20, marginBottom:18 }}>
                    <div>
                      <div style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif",
                        letterSpacing:"0.8px", marginBottom:10, fontWeight:600 }}>INGREDIENSER</div>
                      {recipe.components ? recipe.components.map((comp,ci) => (
                        <div key={ci} style={{ marginBottom: ci < recipe.components.length-1 ? 12 : 0 }}>
                          {recipe.components.length > 1 && (
                            <div style={{ fontSize:10, color:"#e8a838", fontFamily:"sans-serif",
                              fontWeight:600, marginBottom:4, letterSpacing:"0.5px" }}>{comp.name}</div>
                          )}
                          <ul style={{ margin:0, padding:0, listStyle:"none" }}>
                            {comp.ingredients?.map((ing,j) => (
                              <li key={j} style={{ fontSize:13, color:"#d4cdc4", fontFamily:"sans-serif",
                                padding:"5px 0", borderBottom:"1px solid #22232a", display:"flex", gap:8 }}>
                                <span style={{ color:"#e8a838", marginTop:2 }}>•</span>{ing}
                              </li>
                            ))}
                          </ul>
                        </div>
                      )) : (
                        <ul style={{ margin:0, padding:0, listStyle:"none" }}>
                          {recipe.ingredients?.map((ing,j) => (
                            <li key={j} style={{ fontSize:13, color:"#d4cdc4", fontFamily:"sans-serif",
                              padding:"5px 0", borderBottom:"1px solid #22232a", display:"flex", gap:8 }}>
                              <span style={{ color:"#e8a838", marginTop:2 }}>•</span>{ing}
                            </li>
                          ))}
                        </ul>
                      )}
                    </div>
                    <div>
                      <div style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif",
                        letterSpacing:"0.8px", marginBottom:10, fontWeight:600 }}>FREMGANGSMÅTE</div>
                      <ol style={{ margin:0, padding:0, listStyle:"none" }}>
                        {recipe.steps?.map((step,j) => (
                          <li key={j} style={{ fontSize:13, color:"#d4cdc4", fontFamily:"sans-serif",
                            padding:"5px 0", borderBottom:"1px solid #22232a", display:"flex", gap:10 }}>
                            <span style={{ color:"#e8a838", fontWeight:700, minWidth:18, flexShrink:0 }}>{j+1}.</span>{step}
                          </li>
                        ))}
                      </ol>
                    </div>
                  </div>
                  {recipe.nutrition && (
                    <div style={{ borderTop:"1px solid #22232a", paddingTop:14, marginBottom:14 }}>
                      <div style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif",
                        letterSpacing:"0.8px", marginBottom:10, fontWeight:600 }}>NÆRING PER PORSJON</div>
                      <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                        {[
                          {label:"Kalorier",      val:`${recipe.nutrition.calories} kcal`, color:"#d4a84a"},
                          {label:"Protein",       val:`${recipe.nutrition.protein}g`,      color:"#4a8aaa"},
                          {label:"Fett",          val:`${recipe.nutrition.fat}g`,          color:"#aa6a4a"},
                          {label:"Karbohydrater", val:`${recipe.nutrition.carbs}g`,        color:"#8a6aaa"},
                          {label:"Fiber",         val:`${recipe.nutrition.fiber}g`,        color:"#7abf7a"},
                        ].map(n => (
                          <div key={n.label} style={{ flex:"1 1 90px", display:"flex", flexDirection:"column",
                            alignItems:"center", padding:"10px 8px", background:"#1c1d21", borderRadius:8, gap:4 }}>
                            <span style={{ fontSize:14, fontWeight:700, color:n.color, fontFamily:"sans-serif" }}>{n.val}</span>
                            <span style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif" }}>{n.label}</span>
                          </div>
                        ))}
                        {recipe.pricePerPortion && (
                          <div style={{ flex:"1 1 90px", display:"flex", flexDirection:"column",
                            alignItems:"center", padding:"10px 8px", background:"#1c1d21", borderRadius:8, gap:4 }}>
                            <span style={{ fontSize:14, fontWeight:700, color:"#a8c4a8", fontFamily:"sans-serif" }}>
                              ca. {recipe.pricePerPortion.low}–{recipe.pricePerPortion.high} kr
                            </span>
                            <span style={{ fontSize:9, color:"#747280", fontFamily:"sans-serif" }}>
                              {recipe.pricePerPortion.source==="kassal" ? "kassal.app" : "AI-estimat"}
                            </span>
                            <span style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif" }}>Pris/porsjon</span>
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              );
            })()}

            {/* Meal prep tips */}
            {(() => {
              const recipe = recipeCache[planModal?.meal?.name];
              if (!recipe?.tips?.length) return null;
              return (
                <div style={{ borderTop:"1px solid #22232a", paddingTop:14, marginBottom:16 }}>
                  <div style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif",
                    letterSpacing:"0.8px", marginBottom:10, fontWeight:600 }}>MEAL PREP-TIPS</div>
                  <ul style={{ margin:0, padding:0, listStyle:"none", display:"flex", flexDirection:"column", gap:7 }}>
                    {recipe.tips.map((tip, i) => (
                      <li key={i} style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
                        <span style={{ fontSize:14, flexShrink:0 }}>💡</span>
                        <span style={{ fontSize:13, color:"#c8c0d0", fontFamily:"sans-serif", lineHeight:1.5 }}>{tip}</span>
                      </li>
                    ))}
                  </ul>
                </div>
              );
            })()}

            {/* Notes */}
            <div style={{ borderTop:"1px solid #22232a", paddingTop:14, marginBottom:16 }}>
              <div style={{ fontSize:10, color:"#747280", fontFamily:"sans-serif",
                letterSpacing:"0.8px", marginBottom:8, fontWeight:600 }}>NOTATER</div>
              <textarea
                value={notesDraft}
                onChange={e=>setNotesDraft(e.target.value)}
                placeholder="f.eks. dobbel porsjon, uten chili, bytt ut kylling med tofu..."
                rows={2}
                style={{ width:"100%", background:"#141517", border:"1px solid #2a2b30",
                  borderRadius:6, padding:"8px 10px", color:"#e4ddd0", fontFamily:"sans-serif",
                  fontSize:12, resize:"vertical", lineHeight:1.5 }}
              />
            </div>

            {/* Remove button */}
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <button onClick={()=>{ saveNote(); setPlanModal(null); }} style={{ padding:"8px 18px",
                borderRadius:8, border:"1px solid #2a2b30", background:"transparent", color:"#b4b2c2",
                cursor:"pointer", fontSize:13, fontFamily:"sans-serif" }}>Lukk</button>
              <button onClick={()=>{ saveNote(); removeCell(planModal.week,planModal.day); setPlanModal(null); }}
                style={{ padding:"8px 20px", borderRadius:8, border:"1px solid #5a2a2a",
                  background:"#2a1818", color:"#d4a0a0", cursor:"pointer", fontSize:13,
                  fontFamily:"sans-serif", fontWeight:600 }}>🗑 Fjern fra plan</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
